spring:
  application:
    name: network-proxy-manager

pockethive:
  auth:
    service-url: ${POCKETHIVE_AUTH_SERVICE_URL:http://auth-service:8080}
    connect-timeout: ${POCKETHIVE_AUTH_CONNECT_TIMEOUT:PT2S}
    read-timeout: ${POCKETHIVE_AUTH_READ_TIMEOUT:PT5S}
    service-principal:
      name: ${POCKETHIVE_AUTH_SERVICE_PRINCIPAL_NAME:network-proxy-manager}
      secret: ${POCKETHIVE_AUTH_SERVICE_PRINCIPAL_SECRET:network-proxy-manager-local-secret}
  network-proxy-manager:
    http:
      connect-timeout: PT5S
      read-timeout: PT30S
    scenario-manager:
      url: http://scenario-manager:8080
    toxiproxy:
      url: http://toxiproxy:8474
      listen-host: 0.0.0.0
      listen-port-offset: 10000
    haproxy:
      config-file: /opt/haproxy-runtime/haproxy.cfg
      backend-host: toxiproxy

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  config: classpath:logback-spring.xml
