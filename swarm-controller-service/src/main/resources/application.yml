spring:
  application:
    name: ${SPRING_APPLICATION_NAME:swarm-controller-service}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST}

# Include traceId from MDC in log output
logging:
  config: classpath:logback-spring.xml
  pattern:
    level: "%5p [%X{traceId}]"

pockethive:
  journal:
    sink: ${POCKETHIVE_JOURNAL_SINK:postgres}
    run-id: ${POCKETHIVE_JOURNAL_RUN_ID}
  metrics:
    adapter: ${POCKETHIVE_METRICS_ADAPTER}
    publish-interval: ${POCKETHIVE_METRICS_PUBLISH_INTERVAL:10s}
    swarm-id: ${POCKETHIVE_METRICS_SWARM_ID}
    run-id: ${POCKETHIVE_METRICS_RUN_ID}
    role: ${POCKETHIVE_METRICS_ROLE}
    instance: ${POCKETHIVE_METRICS_INSTANCE}
  control-plane:
    exchange: ${POCKETHIVE_CONTROL_PLANE_EXCHANGE}
    control-queue-prefix: ${POCKETHIVE_CONTROL_PLANE_CONTROL_QUEUE_PREFIX}
    swarm-id: ${POCKETHIVE_CONTROL_PLANE_SWARM_ID}
    instance-id: ${POCKETHIVE_CONTROL_PLANE_INSTANCE_ID}
    worker:
      enabled: ${POCKETHIVE_CONTROL_PLANE_WORKER_ENABLED}
    manager:
      enabled: true
      role: ${POCKETHIVE_CONTROL_PLANE_MANAGER_ROLE}
    swarm-controller:
      traffic:
        queue-prefix: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_TRAFFIC_QUEUE_PREFIX}
        hive-exchange: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_TRAFFIC_HIVE_EXCHANGE}
      metrics:
        adapter: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_ADAPTER}
        publish-interval: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_PUBLISH_INTERVAL:10s}
        clickhouse:
          endpoint: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_ENDPOINT:}
          table: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_TABLE:ph_metrics_samples}
          username: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_USERNAME:}
          password: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_PASSWORD:}
          connect-timeout-ms: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_CONNECT_TIMEOUT_MS:3000}
          read-timeout-ms: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_READ_TIMEOUT_MS:5000}
          batch-size: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_BATCH_SIZE:200}
          flush-interval-ms: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_FLUSH_INTERVAL_MS:200}
          max-buffered-samples: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_MAX_BUFFERED_SAMPLES:50000}
          max-label-count: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_MAX_LABEL_COUNT:20}
          max-label-key-length: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_MAX_LABEL_KEY_LENGTH:80}
          max-label-value-length: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_METRICS_CLICKHOUSE_MAX_LABEL_VALUE_LENGTH:256}
      docker:
        socket-path: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_DOCKER_SOCKET_PATH}
      features:
        buffer-guard-enabled: ${POCKETHIVE_CONTROL_PLANE_SWARM_CONTROLLER_FEATURES_BUFFER_GUARD_ENABLED:true}
