version: "3.9"
services:
  worker-plugin-host:
    build:
      context: .
      dockerfile: worker-plugin-host/Dockerfile
    image: worker-plugin-host:latest
    environment:
      POCKETHIVE_PLUGIN_DIR: /opt/pockethive/plugins
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - ./dist/plugins:/opt/pockethive/plugins:ro
    ports:
      - "9010:8080"
