id: local-rest-schema-demo
name: Local REST - Schema-driven body demo
description: Local REST swarm using a JSON Schema to help author the generator
  body in the scenario editor.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
            maxMessages: 0
        message:
          bodyType: HTTP
          path: /schema-demo
          method: POST
          # The schemaRef is used by the Hive scenario editor to render a form;
          # the generator worker itself ignores this field and only uses the body
          # template below.
          schemaRef: schemas/local-rest-body.schema.json#/body
          body: |
            {
              "event": "local-rest-schema-demo",
              "message": "Hello from {{ swarmId }}",
              "correlationId": "{{ correlationId }}"
            }
          headers:
            content-type: application/json
      work:
        out:
          out: genQ
      ports:
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: genQ
        out:
          out: finalQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: finalQ
      ports:
        - { id: in, direction: in }
trafficPolicy: null
plan: null

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: processor, port: in }
    - id: e2
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
