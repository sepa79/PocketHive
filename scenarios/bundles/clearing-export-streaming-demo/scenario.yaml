id: clearing-export-streaming-demo
name: Clearing Export Streaming Demo
description: Runs 20 transactions through
  generator->moderator->processor->clearing-export (template streaming mode) and
  writes one file after time window.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        outputs:
          type: RABBITMQ
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 20
            maxMessages: 20
        message:
          bodyType: HTTP
          path: /api/test
          method: POST
          body: '{"tx":"demo","channel":"e2e-clearing-streaming"}'
          headers:
            content-type: application/json
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: moderator
      id: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: gen
        out:
          out: mod
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
      work:
        in:
          in: mod
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: clearing-export
      id: clearing-export
      image: clearing-export:latest
      config:
        mode: template
        streamingAppendEnabled: true
        streamingWindowMs: 2000
        maxRecordsPerFile: 1000000
        flushIntervalMs: 1000
        maxBufferedRecords: 5000000
        strictTemplate: true
        recordSourceStep: latest
        recordSourceStepIndex: -1
        recordBuildFailurePolicy: stop
        lineSeparator: "\n"
        fileNameTemplate: "STREAM_{{ now }}.dat"
        headerTemplate: "H|{{ now }}"
        recordTemplate: "D|{{ steps.selected.payload }}"
        footerTemplate: "T|{{ recordCount }}"
        localTargetDir: "/tmp/pockethive/clearing-out"
        localTempSuffix: ".tmp"
        writeManifest: false
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: moderator, port: in }
    - id: e2
      from: { beeId: moderator, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: clearing-export, port: in }
