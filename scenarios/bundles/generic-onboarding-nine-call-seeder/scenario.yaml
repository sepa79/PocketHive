id: generic-onboarding-nine-call-seeder
name: generic-onboarding-nine-call-seeder
description: "Generated by wizard.complete from intent: Create a generic
  onboarding data seeder HTTP sequence bundle that proves a tenant batch flow
  and per-user onboarding flow with conditional validation polling. The proof
  should execute 9 outbound HTTP calls in total for one user: open batch, create
  profile/start validation, poll validation pending, poll validation approved,
  create account, initial funding/setup, provision resource, enable optional
  capability, and close batch. Activation is deferred as a follow-on process.
  This is a data seeding capability, not a performance test."
template:
  image: swarm-controller:latest
  bees:
    - id: seed
      role: generator
      image: generator:latest
      work:
        out:
          out: seq
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 500
            maxMessages: "{{ vars.userCount }}"
        outputs:
          type: RABBITMQ
        worker:
          message:
            bodyType: SIMPLE
            body: '{"tenantId":"{{ vars.tenantId }}","batchReference":"{{ vars.batchReference }}","userCount":{{ vars.userCount }},"userOrdinal":{{ headers[''x-ph-seq''] }},"userReference":"{{ vars.tenantId }}-user-{{ headers[''x-ph-seq''] }}","externalUserId":"ext-{{ vars.tenantId }}-{{ headers[''x-ph-seq''] }}","givenName":"Seed","familyName":"User{{ headers[''x-ph-seq''] }}","email":"{{ vars.tenantId }}-user-{{ headers[''x-ph-seq''] }}@example.test","country":"{{ vars.country }}","optionalCapability":{{ vars.optionalCapability }},"activationMode":"deferred","seederRunId":"{{ vars.seederRunId }}"}'
    - id: httpSequence
      role: http-sequence
      image: http-sequence:latest
      work:
        in:
          in: seq
        out:
          out: post
      config:
        worker:
          baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
          templateRoot: /app/scenario/templates/http
          serviceId: sequence
          threadCount: 64
          steps:
            - id: step-1-open-batch
              callId: open-batch
              continueOnNon2xx: false
              extracts:
                - fromJsonPointer: /batchId
                  to: batchId
                  required: true
                - fromJsonPointer: /orderId
                  to: orderId
                  required: true
            - id: step-2-create-profile-validation
              callId: create-profile-validation
              continueOnNon2xx: false
              extracts:
                - fromJsonPointer: /userId
                  to: userId
                  required: true
                - fromJsonPointer: /profileId
                  to: profileId
                  required: true
                - fromJsonPointer: /validationId
                  to: validationId
                  required: true
            - id: step-3-poll-validation-result
              callId: poll-validation-result
              continueOnNon2xx: false
              retry:
                maxAttempts: 4
                initialBackoffMs: 100
                backoffMultiplier: 1
                maxBackoffMs: 100
                on:
                  - "429"
                  - 5xx
                  - exception
                whileJson:
                  - fromJsonPointer: /validationStatus
                    equals: PENDING
                failJson:
                  - fromJsonPointer: /validationStatus
                    equals: REJECTED
                  - fromJsonPointer: /validationStatus
                    equals: TIMEOUT
              extracts:
                - fromJsonPointer: /validationStatus
                  to: validationStatus
                  required: true
            - id: step-4-create-account
              callId: create-account
              continueOnNon2xx: false
              extracts:
                - fromJsonPointer: /accountId
                  to: accountId
                  required: true
                - fromJsonPointer: /accountStatus
                  to: accountStatus
                  required: true
            - id: step-5-initial-funding-setup
              callId: initial-funding-setup
              continueOnNon2xx: false
              extracts:
                - fromJsonPointer: /fundingId
                  to: fundingId
                  required: true
                - fromJsonPointer: /setupId
                  to: setupId
                  required: true
            - id: step-6-provision-resource
              callId: provision-resource
              continueOnNon2xx: false
              extracts:
                - fromJsonPointer: /resourceId
                  to: resourceId
                  required: true
                - fromJsonPointer: /resourceStatus
                  to: resourceStatus
                  required: true
                - fromJsonPointer: /cardId
                  to: cardId
                  required: true
                - fromJsonPointer: /cardStatus
                  to: cardStatus
                  required: true
            - id: step-7-enable-additional-capability
              callId: enable-additional-capability
              continueOnNon2xx: false
              extracts:
                - fromJsonPointer: /capabilityId
                  to: capabilityId
                  required: true
            - id: step-8-close-batch
              callId: close-batch
              continueOnNon2xx: false
              extracts:
                - fromJsonPointer: /batchStatus
                  to: batchStatus
                  required: true
                - fromJsonPointer: /datasetArtifactId
                  to: datasetArtifactId
                  required: true
          debugCapture:
            mode: ERROR_ONLY
            includeHeaders: true
            includeRequest: true
            bodyPreviewBytes: 4096
            redisTtlSeconds: 120
    - id: resultSink
      role: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: post
      config:
        outputs:
          type: REDIS
          redis:
            host: redis
            port: 6379
            sourceStep: LAST
            pushDirection: RPUSH
            targetListTemplate: "{{ vars.outputList }}"
        worker:
          forwardToOutput: true
          txOutcomeSinkMode: NONE
          dropTxOutcomeWithoutCallId: true
topology:
  version: 1
  edges:
    - id: e1
      from:
        beeId: seed
        port: out
      to:
        beeId: httpSequence
        port: in
    - id: e2
      from:
        beeId: httpSequence
        port: out
      to:
        beeId: resultSink
        port: in
trafficPolicy: null
