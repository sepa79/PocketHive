bodyTemplate: '{"tenantId":"{{ payload.tenantId }}","batchId":"{{
  payload.batchId }}","userId":"{{ payload.userId }}","profileId":"{{
  payload.profileId }}","validationStatus":"{{ payload.validationStatus
  }}","productCode":"CORE_ACCOUNT"}'
