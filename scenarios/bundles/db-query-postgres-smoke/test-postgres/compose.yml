services:
  dbquery-test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dbquery
      POSTGRES_USER: dbquery
      POSTGRES_PASSWORD: dbquery
    volumes:
      - dbquery-test-postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbquery -d dbquery"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - pockethive

volumes:
  dbquery-test-postgres-data:

networks:
  pockethive:
    external: true
    name: pockethive_default
