version: 1
definitions:
  - name: ratePerSec
    scope: global
    type: float
    required: true
  - name: maxMessages
    scope: global
    type: int
    required: true
  - name: probeId
    scope: global
    type: string
    required: true
  - name: status
    scope: global
    type: string
    required: true
  - name: remoteMarker
    scope: global
    type: string
    required: true
  - name: queryId
    scope: global
    type: string
    required: true
  - name: threadCount
    scope: global
    type: int
    required: true
  - name: queryTimeoutMs
    scope: global
    type: int
    required: true
  - name: dbJdbcUrl
    scope: global
    type: string
    required: true
  - name: dbUsername
    scope: global
    type: string
    required: true
  - name: dbPassword
    scope: global
    type: string
    required: true
  - name: poolMaxSize
    scope: global
    type: int
    required: true
  - name: poolMinIdle
    scope: global
    type: int
    required: true
  - name: poolConnectionTimeoutMs
    scope: global
    type: int
    required: true
  - name: poolValidationTimeoutMs
    scope: global
    type: int
    required: true
  - name: poolIdleTimeoutMs
    scope: global
    type: int
    required: true
  - name: poolMaxLifetimeMs
    scope: global
    type: int
    required: true
  - name: retryMaxAttempts
    scope: global
    type: int
    required: true
  - name: retryInitialBackoffMs
    scope: global
    type: int
    required: true
  - name: retryBackoffMultiplier
    scope: global
    type: float
    required: true
  - name: retryMaxBackoffMs
    scope: global
    type: int
    required: true
  - name: txOutcomeSinkMode
    scope: global
    type: string
    required: true
  - name: dropTxOutcomeWithoutCallId
    scope: global
    type: bool
    required: true

profiles:
  - id: select
    name: Select
  - id: insert
    name: Insert
  - id: update
    name: Update

