id: webauth-loop-redis-minimal
name: WebAuth Loop (Redis + Metrics)
description: Single-loop WebAuth scenario. Runs TOP -> RED -> BAL -> TOP for
  custA using one Redis input, processor call, and postprocessor metrics before
  writing back to Redis.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          type: REDIS_DATASET
          redis:
            host: redis
            port: 6379
            sources:
              - listName: webauth.TOP.custA
                weight: 1
              - listName: webauth.RED.custA
                weight: 1
              - listName: webauth.BAL.custA
                weight: 1
            pickStrategy: ROUND_ROBIN
            ratePerSec: 15
            ssl: false
            listName: ""
        message:
          bodyType: SIMPLE
          body: "{{ payload }}"
          headers:
            content-type: application/json
            x-ph-service-id: webauth
            x-ph-call-id: webauth-loop
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      id: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/http
        serviceId: webauth
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['webauth'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        outputs:
          type: RABBITMQ
        inputs:
          type: RABBITMQ
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
        outputs:
          type: REDIS
          redis:
            host: redis
            port: 6379
            sourceStep: FIRST
            pushDirection: RPUSH
            routes:
              - header: x-ph-redis-list
                headerMatch: '^webauth\\.TOP\\.custA$'
                list: webauth.RED.custA
              - header: x-ph-redis-list
                headerMatch: '^webauth\\.RED\\.custA$'
                list: webauth.BAL.custA
              - header: x-ph-redis-list
                headerMatch: '^webauth\\.BAL\\.custA$'
                list: webauth.TOP.custA
            ssl: false
            targetListTemplate: ""
            defaultList: ""
            maxLen: -1
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: request-builder, port: in }
    - id: e2
      from: { beeId: request-builder, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
