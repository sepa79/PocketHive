protocolVersion: "2.0.0"
id: webauth-balance-redis
name: WebAuth Balance (Redis -> WebAuth -> Redis)
description: Reads WebAuth balance payloads from Redis list webauth.BAL.custA
  and forwards original payloads to webauth.TOP.custA after processing.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: REDIS_DATASET
          redis:
            host: redis
            port: 6379
            listName: webauth.BAL.custA
            ratePerSec: 5
            ssl: false
            sources: []
            pickStrategy: ROUND_ROBIN
        message:
          bodyType: SIMPLE
          body: "{{ payload }}"
          headers:
            content-type: application/json
            x-ph-service-id: webauth
            x-ph-call-id: webauth-balance
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/http
        serviceId: webauth
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['webauth'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        outputs:
          type: REDIS
          redis:
            host: redis
            port: 6379
            sourceStep: FIRST
            pushDirection: RPUSH
            defaultList: webauth.TOP.custA
            ssl: false
            routes: []
            targetListTemplate: ""
            maxLen: -1
        inputs:
          type: RABBITMQ
      work:
        in:
          in: proc
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: request-builder }
    - id: e2
      from: { port: out, role: request-builder }
      to: { port: in, role: processor }
