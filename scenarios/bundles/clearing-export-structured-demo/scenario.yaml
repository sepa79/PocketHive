id: clearing-export-structured-demo
name: Clearing Export Structured Demo
description: Runs 20 transactions through
  generator->moderator->processor->clearing-export (structured mode XML) and
  writes 2 clearing files.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        outputs:
          type: RABBITMQ
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 20
            maxMessages: 20
        message:
          bodyType: HTTP
          path: /api/test
          method: POST
          body: '{"tx":"demo","channel":"e2e-clearing-structured"}'
          headers:
            content-type: application/json
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: moderator
      id: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: gen
        out:
          out: mod
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
      work:
        in:
          in: mod
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: clearing-export
      id: clearing-export
      image: clearing-export:latest
      config:
        mode: structured
        schemaRegistryRoot: /app/scenario/clearing-schemas
        schemaId: pcs-clearing
        schemaVersion: "1.0.0"
        maxRecordsPerFile: 10
        flushIntervalMs: 60000
        maxBufferedRecords: 5000
        recordSourceStep: latest
        recordSourceStepIndex: -1
        recordBuildFailurePolicy: stop
        localTargetDir: "/tmp/pockethive/clearing-out"
        localTempSuffix: ".tmp"
        writeManifest: false
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: moderator, port: in }
    - id: e2
      from: { beeId: moderator, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: clearing-export, port: in }
