id: http-sequence-six-auth-wizard-proof
name: http-sequence-six-auth-wizard-proof
description: "Generated by wizard.complete from intent: Create an HTTP sequence
  scenario proof with exactly six authenticated business requests using OAuth2
  client credentials against local WireMock. The flow should perform start,
  profile, validate, session update, confirm, and receipt calls in order. It
  should include docs and mock endpoint definitions so the scenario can be
  proved locally through MCP."
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      work:
        out:
          out: seq
      ports:
        - { id: out, direction: out }
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 1
        outputs:
          type: RABBITMQ
        worker:
          message:
            bodyType: SIMPLE
            body: '{"customerId":"CUST-WIZ-1001","proofRun":"wizard-full-report"}'
    - role: http-sequence
      id: http-sequence
      image: http-sequence:latest
      work:
        in:
          in: seq
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      env:
        WIZARD_PROOF_CLIENT_SECRET: local-dummy-wizard-proof-secret
      config:
        worker:
          baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
          templateRoot: /app/scenario/templates/http
          serviceId: sequence
          threadCount: 1
          steps:
            - id: step-1-start
              callId: start
              extracts:
                - fromJsonPointer: /journeyId
                  to: journeyId
                  required: true
                - fromJsonPointer: /sessionId
                  to: sessionId
                  required: true
            - id: step-2-profile
              callId: profile
              extracts:
                - fromJsonPointer: /profileVersion
                  to: profileVersion
                  required: true
            - id: step-3-validate
              callId: validate
              extracts:
                - fromJsonPointer: /validationId
                  to: validationId
                  required: true
            - id: step-4-session-update
              callId: session-update
              extracts:
                - fromJsonPointer: /sessionVersion
                  to: sessionVersion
                  required: true
            - id: step-5-confirm
              callId: confirm
              extracts:
                - fromJsonPointer: /confirmationId
                  to: confirmationId
                  required: true
            - id: step-6-receipt
              callId: receipt
              extracts:
                - fromJsonPointer: /receiptId
                  to: receiptId
                  required: true
          debugCapture:
            mode: ALWAYS
            includeHeaders: true
            includeRequest: true
            bodyPreviewBytes: 4096
            redisTtlSeconds: 120
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }
plan:
  version: 1
  source: wizard.complete
  pattern: sequence
  profiles:
    smoke:
      ratePerSec: 1
      duration: 10s
      trafficShape: smoke
    default:
      ratePerSec: 1
      duration: 10s
      trafficShape: smoke
    nft:
      ratePerSec: 1
      duration: 10s
      trafficShape: smoke
  endpoints:
    - method: POST
      path: /api/wizard-proof/start
      callId: start
      description: Start authenticated journey
      bodyTemplate: '{"step":"start","customerId":"{{ payload.customerId }}","proofRun":"{{ payload.proofRun }}"}'
    - method: GET
      path: /api/wizard-proof/profile
      callId: profile
      description: Read authenticated profile
    - method: POST
      path: /api/wizard-proof/validate
      callId: validate
      description: Validate authenticated state
      bodyTemplate: '{"step":"validate","customerId":"{{ payload.customerId }}","journeyId":"{{ payload.journeyId }}","sessionId":"{{ payload.sessionId }}","profileVersion":"{{ payload.profileVersion }}"}'
    - method: PUT
      path: /api/wizard-proof/session
      callId: session-update
      description: Update authenticated session
      bodyTemplate: '{"step":"session-update","journeyId":"{{ payload.journeyId }}","sessionId":"{{ payload.sessionId }}","validationId":"{{ payload.validationId }}","state":"confirmed"}'
    - method: POST
      path: /api/wizard-proof/confirm
      callId: confirm
      description: Confirm authenticated operation
      bodyTemplate: '{"step":"confirm","customerId":"{{ payload.customerId }}","journeyId":"{{ payload.journeyId }}","sessionVersion":"{{ payload.sessionVersion }}","validationId":"{{ payload.validationId }}"}'
    - method: GET
      path: /api/wizard-proof/receipt
      callId: receipt
      description: Fetch authenticated receipt
  dataSource: SCHEDULER
  observability:
    clickhouse: no
    grafanaDashboard: none
    performanceObjective: null
    resultRules:
      resultCodePattern: '"ok"\s*:\s*(true|false)'
      successCodes:
        - "true"

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: http-sequence, port: in }
    - id: e2
      from: { beeId: http-sequence, port: out }
      to: { beeId: postprocessor, port: in }
