      trafficShape: smoke
    default:
      ratePerSec: 1
      runDuration: 10s
      trafficShape: smoke
    nft:
      ratePerSec: 1
      runDuration: 10s
      trafficShape: smoke
  sut:
    smoke:
      wiremock-local:
        targetBaseUrl: http://wiremock:8080
    default:
      wiremock-local:
        targetBaseUrl: http://wiremock:8080
    nft:
      wiremock-local:
        targetBaseUrl: http://wiremock:8080
