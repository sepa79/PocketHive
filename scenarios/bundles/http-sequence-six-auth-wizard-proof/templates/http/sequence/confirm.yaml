pathTemplate: /api/wizard-proof/confirm
headersTemplate:
  content-type: application/json
bodyTemplate: '{"step":"confirm","customerId":"{{ payload.customerId }}","journeyId":"{{ payload.journeyId }}","sessionVersion":"{{ payload.sessionVersion }}","validationId":"{{ payload.validationId }}"}'
authRef:
  profileId: wizard-auth
  applyAs: HTTP_AUTHORIZATION_BEARER
