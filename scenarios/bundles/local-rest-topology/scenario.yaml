id: local-rest-topology
name: Local REST - Simple REST Swarm (Topology)
description: Simple WireMock-backed local REST swarm with logical topology edges for UI testing.
template:
  image: swarm-controller:latest
  bees:
    - id: genA
      role: generator
      image: generator:latest
      ports:
        - { id: out, direction: out }
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 50
        message:
          bodyType: HTTP
          path: /test
          method: POST
          body: '{"event":"local-rest"}'
          headers:
            content-type: application/json
      work:
        out:
          out: genQ
    - id: modA
      role: moderator
      image: moderator:latest
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      config:
        mode:
          type: rate-per-sec
          ratePerSec: 10
      work:
        in:
          in: genQ
        out:
          out: modQ
    - id: procA
      role: processor
      image: processor:latest
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
        mode: THREAD_COUNT
        threadCount: 1
      work:
        in:
          in: modQ
        out:
          out: finalQ
    - id: postA
      role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      ports:
        - { id: in, direction: in }
      work:
        in:
          in: finalQ

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: genA, port: out }
      to: { beeId: modA, port: in }
    - id: e2
      from: { beeId: modA, port: out }
      to: { beeId: procA, port: in }
    - id: e3
      from: { beeId: procA, port: out }
      to: { beeId: postA, port: in }
