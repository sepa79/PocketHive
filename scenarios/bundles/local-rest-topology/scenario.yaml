protocolVersion: "2.0.0"
id: local-rest-topology
name: Local REST - Simple REST Swarm (Topology)
description: Simple WireMock-backed local REST swarm with logical topology edges
  for UI testing.
template:
  image: swarm-controller:latest
  bees:
    - role: genA
      image: generator:latest
      ports:
        - { id: out, direction: out }
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 50
            maxMessages: 0
        message:
          bodyType: HTTP
          path: /test
          method: POST
          body: '{"event":"local-rest"}'
          headers:
            content-type: application/json
      work:
        out:
          out: genQ
    - role: modA
      image: moderator:latest
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      config:
        mode:
          type: rate-per-sec
          ratePerSec: 10
      work:
        in:
          in: genQ
        out:
          out: modQ
    - role: procA
      image: processor:latest
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: modQ
        out:
          out: finalQ
    - role: postA
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      ports:
        - { id: in, direction: in }
      work:
        in:
          in: finalQ

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: genA }
      to: { port: in, role: modA }
    - id: e2
      from: { port: out, role: modA }
      to: { port: in, role: procA }
    - id: e3
      from: { port: out, role: procA }
      to: { port: in, role: postA }
