id: local-rest-two-moderators
name: Local REST - Double Moderator Chain
description: Local images wired as generator → moderator A → processor →
  moderator B → postprocessor. Guard monitors `moderator-a-out` against a
  deterministic WireMock delay to showcase steady-state buffer control.
trafficPolicy:
  bufferGuard:
    enabled: true
    queueAlias: gen-out
    targetDepth: 200
    minDepth: 150
    maxDepth: 260
    samplePeriod: 5s
    movingAverageWindow: 4
    adjust:
      maxIncreasePct: 10
      maxDecreasePct: 20
      minRatePerSec: 1
      maxRatePerSec: 50
    prefill:
      enabled: false
      lookahead: 2m
      liftPct: 25
    backpressure:
      queueAlias: moderator-a-out
      highDepth: 500
      recoveryDepth: 250
      moderatorReductionPct: 20
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
        message:
          bodyType: HTTP
          path: /api/guarded
          method: POST
          body: hello from generator
      work:
        out:
          out: gen-out
      ports:
        - { id: out, direction: out }
    - role: moderator
      id: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: gen-out
        out:
          out: mod-out
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
      work:
        in:
          in: mod-out
        out:
          out: mod2-out
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: moderator
      id: moderator-2
      image: moderator:latest
      config:
        mode:
          type: rate-per-sec
          ratePerSec: 5
      work:
        in:
          in: mod2-out
        out:
          out: final
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: final
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: moderator, port: in }
    - id: e2
      from: { beeId: moderator, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: moderator-2, port: in }
    - id: e4
      from: { beeId: moderator-2, port: out }
      to: { beeId: postprocessor, port: in }
