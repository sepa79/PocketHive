id: http-sequence-six-auth-flow
name: http-sequence-six-auth-flow
description: "Generated by wizard.complete from intent: Create an HTTP sequence
  proof with exactly six authenticated business requests using OAuth2 client
  credentials against local WireMock."
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      work:
        out:
          out: seq
      ports:
        - { id: out, direction: out }
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 1
        outputs:
          type: RABBITMQ
        message:
          bodyType: SIMPLE
          body: "{}"
    - role: http-sequence
      id: http-sequence
      image: http-sequence:latest
      work:
        in:
          in: seq
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        templateRoot: /app/scenario/templates/http
        serviceId: sequence
        threadCount: 1
        steps:
          - id: step-1-start
            callId: start
          - id: step-2-profile
            callId: profile
          - id: step-3-validate
            callId: validate
          - id: step-4-session-update
            callId: session-update
          - id: step-5-confirm
            callId: confirm
          - id: step-6-receipt
            callId: receipt
        debugCapture:
          mode: ALWAYS
          includeHeaders: true
          includeRequest: true
          bodyPreviewBytes: 4096
          redisTtlSeconds: 120
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }
plan:
  version: 1
  source: wizard.complete
  pattern: sequence
  profiles:
    smoke:
      ratePerSec: 1
      duration: 10s
      trafficShape: smoke
    default:
      ratePerSec: 1
      duration: 20s
      trafficShape: smoke
    nft:
      ratePerSec: 1
      duration: 20s
      trafficShape: smoke
  endpoints:
    - method: POST
      path: /api/six-auth/start
      callId: start
      description: Start authenticated customer journey
      bodyTemplate: '{"step":"start","customerId":"CUST-1001"}'
    - method: GET
      path: /api/six-auth/profile
      callId: profile
      description: Read profile after auth
    - method: POST
      path: /api/six-auth/validate
      callId: validate
      description: Validate customer state
      bodyTemplate: '{"step":"validate","customerId":"CUST-1001"}'
    - method: PUT
      path: /api/six-auth/session
      callId: session-update
      description: Update authenticated session
      bodyTemplate: '{"step":"session-update","state":"confirmed"}'
    - method: POST
      path: /api/six-auth/confirm
      callId: confirm
      description: Confirm authenticated operation
      bodyTemplate: '{"step":"confirm","customerId":"CUST-1001"}'
    - method: GET
      path: /api/six-auth/receipt
      callId: receipt
      description: Fetch final receipt
  dataSource: SCHEDULER
  observability:
    clickhouse: yes_for_nft_only
    grafanaDashboard: rtt_overview
    performanceObjective: null
    resultRules: null

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: http-sequence, port: in }
    - id: e2
      from: { beeId: http-sequence, port: out }
      to: { beeId: postprocessor, port: in }
