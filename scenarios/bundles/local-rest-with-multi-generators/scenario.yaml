id: local-rest-with-multi-generators
name: Local REST - Multi Generators
description: Uses local images. Sample REST scenario that ships two generator
  bees with distinct payloads, rate limits, and an expected 10% beta generator
  failure rate.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 30
            maxMessages: 0
        message:
          bodyType: HTTP
          path: /api/test-alpha
          method: POST
          body: hello-from-generator-a
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: generator-2
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 70
            maxMessages: 0
        message:
          bodyType: HTTP
          path: /api/test-beta
          method: POST
          body: hello-from-generator-b
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: gen
        out:
          out: mod
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: mod
        out:
          out: final
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: final
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: moderator }
    - id: e2
      from: { port: out, role: generator-2 }
      to: { port: in, role: moderator }
    - id: e3
      from: { port: out, role: moderator }
      to: { port: in, role: processor }
    - id: e4
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
