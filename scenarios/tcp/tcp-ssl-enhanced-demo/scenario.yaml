id: tcp-ssl-enhanced-demo
name: TCP SSL Enhanced Demo
description: Demonstrates enhanced TCP features including SSL, metrics,
  validation, and filtering
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 2
            maxMessages: 10
        message:
          bodyType: SIMPLE
          body: |
            {
              "sessionId": "SSL_{{ eval('#uuid()') }}",
              "encryptedData": "{{ eval("#base64_encode('Enhanced SSL data: ' + #randInt(1000, 9999))") }}",
              "signature": "{{ eval("#hmac_sha256_hex('secretkey', #uuid())") }}",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS''Z''')") }}"
            }
          headers:
            x-ph-call-id: ssl-enhanced-message
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      id: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: enhanced
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcps-server'].baseUrl }}"
        tcpTransport:
          type: socket
          connectionReuse: PER_THREAD
          maxRetries: 3
          connectTimeoutMs: 5000
          readTimeoutMs: 8000
          sslVerify: false
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }
plan:
  bees:
    - role: generator
      steps:
        - stepId: gen-start
          name: Start generator
          time: PT1S
          type: start
  swarm:
    - stepId: swarm-start
      name: Start swarm
      time: PT0S
      type: start

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: request-builder, port: in }
    - id: e2
      from: { beeId: request-builder, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
