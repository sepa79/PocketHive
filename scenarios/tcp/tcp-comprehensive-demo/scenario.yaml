---
id: "tcp-comprehensive-demo"
name: "TCP Capabilities Demo"
description: "Demonstrates TCP Mock Server capabilities including ISO-8583,
  performance analytics, and enterprise features"
template:
  image: "swarm-controller:latest"
  bees:
    - role: "generator-iso8583"
      image: "generator:latest"
      work:
        in:
          in: null
        out:
          out: "iso8583-build"
      ports:
        - { id: out, direction: out }
      env: {}
      config:
        inputs:
          type: "SCHEDULER"
          scheduler:
            ratePerSec: 10
            maxMessages: 100
        message:
          bodyType: "SIMPLE"
          body: "{

            \  \"messageType\": \"ISO8583_AUTH\",

            \  \"mti\": \"0100\",

            \  \"transactionId\": \"{{ eval('#uuid()') }}\",

            \  \"amount\": \"{{ eval('#randInt(100,50000)') }}\",

            \  \"pan\": \"4111111111111{{ eval('#randInt(100,999)') }}\",

            \  \"timestamp\": \"{{ eval('#nowIso()') }}\",

            \  \"merchantId\": \"MERCH{{ eval('#randInt(1000,9999)') }}\"

            }\n"
          headers:
            x-ph-call-id: "ProcessTransaction"
            x-ph-service-id: "payment-gateway"
    - role: "generator-performance"
      image: "generator:latest"
      work:
        in:
          in: null
        out:
          out: "perf-build"
      ports:
        - { id: out, direction: out }
      env: {}
      config:
        inputs:
          type: "SCHEDULER"
          scheduler:
            ratePerSec: 50
            maxMessages: 500
        message:
          bodyType: "SIMPLE"
          body: "{

            \  \"messageType\": \"PERFORMANCE_TEST\",

            \  \"batchId\": \"BATCH_{{ eval('#randInt(1000,9999)') }}\",

            \  \"transactionId\": \"{{ eval('#uuid()') }}\",

            \  \"amount\": \"{{ eval('#randInt(100,100000)') }}\",

            \  \"timestamp\": \"{{ eval('#nowIso()') }}\"

            }\n"
          headers:
            x-ph-call-id: "PerformanceTest"
            x-ph-service-id: "performance"
    - role: "generator-netty"
      image: "generator:latest"
      work:
        in:
          in: null
        out:
          out: "netty-build"
      ports:
        - { id: out, direction: out }
      env: {}
      config:
        inputs:
          type: "SCHEDULER"
          scheduler:
            ratePerSec: 1
            maxMessages: 5
        message:
          bodyType: "SIMPLE"
          body: "{

            \  \"testType\": \"netty\",

            \  \"messageId\": \"NETTY_{{ eval('#randInt(1000, 9999)') }}\",

            \  \"payload\": \"Netty async test\",

            \  \"timestamp\": \"{{ eval('#date_format(now, \"HH:mm:ss\")') }}\"

            }\n"
          headers:
            x-ph-call-id: "netty-test"
            x-ph-service-id: "demo"
    - role: "request-builder-iso"
      image: "request-builder:latest"
      work:
        in:
          in: "iso8583-build"
        out:
          out: "proc"
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      env: {}
      config:
        templateRoot: "/app/scenario/templates/tcp"
        serviceId: "demo"
        passThroughOnMissingTemplate: false
    - role: "request-builder-perf"
      image: "request-builder:latest"
      work:
        in:
          in: "perf-build"
        out:
          out: "proc"
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      env: {}
      config:
        templateRoot: "/app/scenario/templates/tcp"
        serviceId: "demo"
        passThroughOnMissingTemplate: false
    - role: "request-builder-netty"
      image: "request-builder:latest"
      work:
        in:
          in: "netty-build"
        out:
          out: "proc"
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      env: {}
      config:
        templateRoot: "/app/scenario/templates/tcp"
        serviceId: "demo"
        passThroughOnMissingTemplate: false
    - role: "processor"
      image: "processor:latest"
      work:
        in:
          in: "proc"
        out:
          out: "post"
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      env: {}
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: "THREAD_COUNT"
        threadCount: 10
        keepAlive: true
        tcpTransport:
          type: "socket"
          connectionReuse: "PER_THREAD"
          maxRetries: 3
          connectTimeoutMs: 3000
          readTimeoutMs: 5000
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
    - role: "postprocessor"
      image: "postprocessor:latest"
      work:
        in:
          in: "post"
        out:
          out: null
      ports:
        - { id: in, direction: in }
      env: {}
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
plan:
  bees:
    - role: "generator-iso8583"
      steps:
        - stepId: gen-iso-start
          name: Start ISO-8583 generator after setup
          time: PT1S
          type: start
    - role: "generator-performance"
      steps:
        - stepId: gen-perf-start
          name: Start performance generator after setup
          time: PT1S
          type: start
    - role: "generator-netty"
      steps:
        - stepId: gen-netty-start
          name: Start netty generator after setup
          time: PT1S
          type: start
  swarm:
    - stepId: swarm-start
      name: Start swarm
      time: PT0S
      type: start

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator-iso8583 }
      to: { port: in, role: request-builder-iso }
    - id: e2
      from: { port: out, role: generator-performance }
      to: { port: in, role: request-builder-perf }
    - id: e3
      from: { port: out, role: generator-netty }
      to: { port: in, role: request-builder-netty }
    - id: e4
      from: { port: out, role: request-builder-iso }
      to: { port: in, role: processor }
    - id: e5
      from: { port: out, role: request-builder-perf }
      to: { port: in, role: processor }
    - id: e6
      from: { port: out, role: request-builder-netty }
      to: { port: in, role: processor }
    - id: e7
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
