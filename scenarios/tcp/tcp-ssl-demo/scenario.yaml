id: tcp-ssl-demo
name: TCP SSL/TLS Secure Demo
description: Demonstrates secure TCP communication using TLS with certificate
  verification options
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 2
            maxMessages: 1
        message:
          bodyType: SIMPLE
          body: |
            {
              "sessionId": "SEC_{{ eval('#uuid()') }}",
              "encryptedData": "{{ eval("#base64_encode('Sensitive data: ' + #randInt(1000, 9999))") }}",
              "signature": "{{ eval("#hmac_sha256_hex('secretkey', #uuid())") }}",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS''Z''')") }}"
            }
          headers:
            x-ph-call-id: secure-message
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: secure
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcps-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        tcpTransport:
          type: socket
          connectionReuse: NONE
          maxRetries: 2
          connectTimeoutMs: 5000
          readTimeoutMs: 8000
          sslVerify: false
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }
plan:
  bees:
    - role: generator
      steps:
        - stepId: gen-start
          name: Start generator
          time: PT1S
          type: start
  swarm:
    - stepId: swarm-start
      name: Start swarm
      time: PT0S
      type: start

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: request-builder }
    - id: e2
      from: { port: out, role: request-builder }
      to: { port: in, role: processor }
    - id: e3
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
