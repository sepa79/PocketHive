protocolVersion: "2.0.0"
id: tcp-netty-demo
name: TCP Netty Transport Demo
description: Demonstrates TCP using Netty async transport for high-throughput scenarios
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
            maxMessages: 50
        message:
          bodyType: SIMPLE
          body: |
            {
              "messageId": "MSG_{{ eval('#randInt(100000, 999999)') }}",
              "payload": "{{ eval("#base64_encode('High throughput message ' + #randInt(1, 1000))") }}",
              "priority": "{{ eval('#randInt(1, 5)') }}",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS')") }}"
            }
          headers:
            x-ph-call-id: netty-message
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: messaging
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        tcpTransport:
          type: netty
          maxRetries: 2
          connectTimeoutMs: 3000
          readTimeoutMs: 5000
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }
plan:
  bees:
    - role: generator
      steps:
        - stepId: gen-start
          name: Start generator
          time: PT1S
          type: start
  swarm:
    - stepId: swarm-start
      name: Start swarm
      time: PT0S
      type: start

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: request-builder }
    - id: e2
      from: { port: out, role: request-builder }
      to: { port: in, role: processor }
    - id: e3
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
