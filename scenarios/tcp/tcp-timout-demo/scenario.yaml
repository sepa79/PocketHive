id: tcp-timeout-demo
name: TCP Timeout and Delay Demo
description: Demonstrates TCP timeout handling with fast, slow, and timeout responses
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 30
        message:
          bodyType: SIMPLE
          body: |
            {
              "testId": "TEST_{{ eval('#randInt(1000, 9999)') }}",
              "testType": "FAST",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss')") }}"
            }
          headers:
            x-ph-call-id: timeout-test
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      id: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: default
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        tcpTransport:
          type: socket
          connectionReuse: PER_THREAD
          maxRetries: 2
          connectTimeoutMs: 2000
          readTimeoutMs: 5000
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        postprocessor:
          publish-all-metrics: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }
plan:
  bees:
    - role: generator
      steps:
        - stepId: gen-start
          name: Start generator
          time: PT1S
          type: start
  swarm:
    - stepId: swarm-start
      name: Start swarm
      time: PT0S
      type: start

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: request-builder, port: in }
    - id: e2
      from: { beeId: request-builder, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
