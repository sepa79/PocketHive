protocolVersion: "2.0.0"
id: tcp-connection-pooling-demo
name: TCP Connection Pooling Comparison
description: Compares GLOBAL, PER_THREAD, and NONE connection pooling strategies
template:
  image: swarm-controller:latest
  bees:
    - role: trigger
      image: trigger:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 0
            maxMessages: 1
        intervalMs: 0
        singleRequest: true
        actionType: rest
        command: setup-tcp-pooling-mapping
        url: "http://tcp-mock-server:8083/api/mappings"
        method: POST
        headers:
          Content-Type: application/json
        body: |
          {
            "id": "tcp-pool-test",
            "requestPattern": ".*",
            "responseTemplate": "STX{{timestamp}}|POOL_OK|{{randomValue type='INT'}}ETX",
            "responseDelimiter": "\n",
            "priority": 10,
            "description": "Pool test response"
          }
      work:
        out:
          out: setup
      ports:
        - { id: out, direction: out }
    - role: generator-global
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
            maxMessages: 100
        message:
          bodyType: SIMPLE
          body: |
            {
              "testId": "GLOBAL_{{ eval('#randInt(1000, 9999)') }}",
              "poolType": "GLOBAL",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS')") }}"
            }
          headers:
            x-ph-call-id: pool-test
      work:
        out:
          out: build-global
      ports:
        - { id: out, direction: out }
    - role: generator-per-thread
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
            maxMessages: 100
        message:
          bodyType: SIMPLE
          body: |
            {
              "testId": "PER_THREAD_{{ eval('#randInt(1000, 9999)') }}",
              "poolType": "PER_THREAD",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS')") }}"
            }
          headers:
            x-ph-call-id: pool-test
      work:
        out:
          out: build-per-thread
      ports:
        - { id: out, direction: out }
    - role: generator-none
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
            maxMessages: 100
        message:
          bodyType: SIMPLE
          body: |
            {
              "testId": "NONE_{{ eval('#randInt(1000, 9999)') }}",
              "poolType": "NONE",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS')") }}"
            }
          headers:
            x-ph-call-id: pool-test
      work:
        out:
          out: build-none
      ports:
        - { id: out, direction: out }
    - role: request-builder-global
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build-global
        out:
          out: proc-global
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: request-builder-per-thread
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build-per-thread
        out:
          out: proc-per-thread
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: request-builder-none
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build-none
        out:
          out: proc-none
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor-global
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 10
        tcpTransport:
          type: socket
          connectionReuse: GLOBAL
          maxRetries: 1
          connectTimeoutMs: 2000
          readTimeoutMs: 3000
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc-global
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor-per-thread
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 10
        tcpTransport:
          type: socket
          connectionReuse: PER_THREAD
          maxRetries: 1
          connectTimeoutMs: 2000
          readTimeoutMs: 3000
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc-per-thread
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor-none
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 10
        tcpTransport:
          type: socket
          connectionReuse: NONE
          maxRetries: 1
          connectTimeoutMs: 2000
          readTimeoutMs: 3000
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc-none
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator-global }
      to: { port: in, role: request-builder-global }
    - id: e2
      from: { port: out, role: generator-per-thread }
      to: { port: in, role: request-builder-per-thread }
    - id: e3
      from: { port: out, role: generator-none }
      to: { port: in, role: request-builder-none }
    - id: e4
      from: { port: out, role: request-builder-global }
      to: { port: in, role: processor-global }
    - id: e5
      from: { port: out, role: request-builder-per-thread }
      to: { port: in, role: processor-per-thread }
    - id: e6
      from: { port: out, role: request-builder-none }
      to: { port: in, role: processor-none }
    - id: e7
      from: { port: out, role: processor-global }
      to: { port: in, role: postprocessor }
    - id: e8
      from: { port: out, role: processor-per-thread }
      to: { port: in, role: postprocessor }
    - id: e9
      from: { port: out, role: processor-none }
      to: { port: in, role: postprocessor }
