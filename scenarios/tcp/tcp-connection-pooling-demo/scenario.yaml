id: tcp-connection-pooling-demo
name: TCP Connection Pooling Comparison
description: Compares GLOBAL, PER_THREAD, and NONE connection pooling strategies
template:
  image: swarm-controller:latest
  bees:
    - role: trigger
      id: trigger
      image: trigger:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 0
            maxMessages: 1
        worker:
          config:
            actionType: rest
            url: "http://tcp-mock-server:8083/api/mappings"
            method: POST
            headers:
              Content-Type: application/json
            body: |
              {
                "id": "tcp-pool-test",
                "requestPattern": ".*",
                "responseTemplate": "STX{{timestamp}}|POOL_OK|{{randomValue type='INT'}}ETX",
                "responseDelimiter": "\n",
                "priority": 10,
                "description": "Pool test response"
              }
      work:
        out:
          out: setup
      ports:
        - { id: out, direction: out }
    - role: generator-global
      id: generator-global
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
            maxMessages: 100
        worker:
          message:
            bodyType: SIMPLE
            body: |
              {
                "testId": "GLOBAL_{{ eval('#randInt(1000, 9999)') }}",
                "poolType": "GLOBAL",
                "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS')") }}"
              }
            headers:
              x-ph-call-id: pool-test
      work:
        out:
          out: build-global
      ports:
        - { id: out, direction: out }
    - role: generator-per-thread
      id: generator-per-thread
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
            maxMessages: 100
        worker:
          message:
            bodyType: SIMPLE
            body: |
              {
                "testId": "PER_THREAD_{{ eval('#randInt(1000, 9999)') }}",
                "poolType": "PER_THREAD",
                "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS')") }}"
              }
            headers:
              x-ph-call-id: pool-test
      work:
        out:
          out: build-per-thread
      ports:
        - { id: out, direction: out }
    - role: generator-none
      id: generator-none
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 10
            maxMessages: 100
        worker:
          message:
            bodyType: SIMPLE
            body: |
              {
                "testId": "NONE_{{ eval('#randInt(1000, 9999)') }}",
                "poolType": "NONE",
                "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS')") }}"
              }
            headers:
              x-ph-call-id: pool-test
      work:
        out:
          out: build-none
      ports:
        - { id: out, direction: out }
    - role: request-builder-global
      id: request-builder-global
      image: request-builder:latest
      config:
        worker:
          templateRoot: /app/scenario/templates/tcp
          serviceId: default
      work:
        in:
          in: build-global
        out:
          out: proc-global
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: request-builder-per-thread
      id: request-builder-per-thread
      image: request-builder:latest
      config:
        worker:
          templateRoot: /app/scenario/templates/tcp
          serviceId: default
      work:
        in:
          in: build-per-thread
        out:
          out: proc-per-thread
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: request-builder-none
      id: request-builder-none
      image: request-builder:latest
      config:
        worker:
          templateRoot: /app/scenario/templates/tcp
          serviceId: default
      work:
        in:
          in: build-none
        out:
          out: proc-none
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor-global
      id: processor-global
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        worker:
          mode: THREAD_COUNT
          threadCount: 10
          tcpTransport:
            type: socket
            connectionReuse: GLOBAL
            maxRetries: 1
            connectTimeoutMs: 2000
            readTimeoutMs: 3000
      work:
        in:
          in: proc-global
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor-per-thread
      id: processor-per-thread
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        worker:
          mode: THREAD_COUNT
          threadCount: 10
          tcpTransport:
            type: socket
            connectionReuse: PER_THREAD
            maxRetries: 1
            connectTimeoutMs: 2000
            readTimeoutMs: 3000
      work:
        in:
          in: proc-per-thread
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor-none
      id: processor-none
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        worker:
          mode: THREAD_COUNT
          threadCount: 10
          tcpTransport:
            type: socket
            connectionReuse: NONE
            maxRetries: 1
            connectTimeoutMs: 2000
            readTimeoutMs: 3000
      work:
        in:
          in: proc-none
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        worker:
          postprocessor:
            publish-all-metrics: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator-global, port: out }
      to: { beeId: request-builder-global, port: in }
    - id: e2
      from: { beeId: generator-per-thread, port: out }
      to: { beeId: request-builder-per-thread, port: in }
    - id: e3
      from: { beeId: generator-none, port: out }
      to: { beeId: request-builder-none, port: in }
    - id: e4
      from: { beeId: request-builder-global, port: out }
      to: { beeId: processor-global, port: in }
    - id: e5
      from: { beeId: request-builder-per-thread, port: out }
      to: { beeId: processor-per-thread, port: in }
    - id: e6
      from: { beeId: request-builder-none, port: out }
      to: { beeId: processor-none, port: in }
    - id: e7
      from: { beeId: processor-global, port: out }
      to: { beeId: postprocessor, port: in }
    - id: e8
      from: { beeId: processor-per-thread, port: out }
      to: { beeId: postprocessor, port: in }
    - id: e9
      from: { beeId: processor-none, port: out }
      to: { beeId: postprocessor, port: in }
