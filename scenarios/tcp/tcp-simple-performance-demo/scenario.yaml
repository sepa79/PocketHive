protocolVersion: "2.0.0"
id: tcp-simple-performance-demo
name: TCP Simple Performance Test
description: Simplified high-throughput TCP test with sustained 50 TPS load
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 50
            maxMessages: 1000
        message:
          bodyType: SIMPLE
          body: |
            {
              "txnId": "TXN_{{ eval('#randInt(100000, 999999)') }}",
              "payload": "{{ eval("#base64_encode('perf_' + #randInt(1, 10000))") }}",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss.SSS')") }}"
            }
          headers:
            x-ph-call-id: simple-perf-test
      work:
        out:
          out: mod
      ports:
        - { id: out, direction: out }
    - role: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: mod
        out:
          out: build
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 25
        tcpTransport:
          type: socket
          connectionReuse: PER_THREAD
          maxRetries: 2
          connectTimeoutMs: 3000
          readTimeoutMs: 5000
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: moderator }
    - id: e2
      from: { port: out, role: moderator }
      to: { port: in, role: request-builder }
    - id: e3
      from: { port: out, role: request-builder }
      to: { port: in, role: processor }
    - id: e4
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
