protocolVersion: "2.0.0"
id: auth-proving-http-sequence
name: Auth Proving - HTTP Sequence
description: Proves http-sequence per-step auth, shared Redis token reuse, mixed
  profiles, and repeated step order.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 1
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-sequence","journey":"mixed-auth"}'
          headers:
            content-type: application/json
      work:
        out:
          out: sequence
      ports:
        - { id: out, direction: out }
    - role: http-sequence
      image: http-sequence:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        templateRoot: /app/scenario/templates/http
        serviceId: sequence
        threadCount: 1
        debugCapture:
          mode: ALWAYS
          includeHeaders: true
          includeRequest: true
          bodyPreviewBytes: 512
          redisTtlSeconds: 300
        steps:
          - id: oauth-first
            callId: oauth-shared
          - id: basic-middle
            callId: basic-step
          - id: oauth-again
            callId: oauth-shared
          - id: query-step
            callId: query-step
          - id: static-final
            callId: static-final
      work:
        in:
          in: sequence
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: http-sequence }
    - id: e2
      from: { port: out, role: http-sequence }
      to: { port: in, role: postprocessor }
