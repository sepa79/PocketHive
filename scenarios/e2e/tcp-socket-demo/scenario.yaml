protocolVersion: "2.0.0"
id: tcp-socket-demo
name: TCP Socket Request-Response Demo
description: Demonstrates TCP request-response using socket transport with keep-alive
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 3
            maxMessages: 15
        message:
          bodyType: SIMPLE
          body: |
            {
              "requestId": "REQ_{{ eval('#randInt(10000, 99999)') }}",
              "operation": "BALANCE_INQUIRY",
              "accountId": "ACC_{{ eval('#randInt(1000, 9999)') }}",
              "timestamp": "{{ eval("#date_format(now, 'yyyy-MM-dd''T''HH:mm:ss')") }}"
            }
          headers:
            x-ph-call-id: tcp-request
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: banking
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        tcpTransport:
          type: socket
          connectionReuse: PER_THREAD
          maxRetries: 1
          connectTimeoutMs: 2000
          readTimeoutMs: 3000
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: request-builder }
    - id: e2
      from: { port: out, role: request-builder }
      to: { port: in, role: processor }
    - id: e3
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
