id: local-rest-defaults
name: Local REST - Simple REST Swarm using Defaults
description: Uses local images. Sample scenario that is using defaults from workers.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          scheduler:
            ratePerSec: 1.0
        message:
          path: /api/test
          method: POST
          body: hello-world
          headers: {}
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: moderator
      id: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
      work:
        in:
          in: gen
        out:
          out: mod
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
      work:
        in:
          in: mod
        out:
          out: final
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: final
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: moderator, port: in }
    - id: e2
      from: { beeId: moderator, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
