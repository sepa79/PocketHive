id: templated-rest
name: Local REST - Templated Generator
description: Uses local images. Sample scenario that enables the templating interceptor for the generator.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          scheduler:
            ratePerSec: 5
        worker:
          message:
            bodyType: HTTP
            path: /api/guarded
            method: POST
            body: "{{ payload }}"
            headers:
              content-type: text/plain
        interceptors:
          templating:
            template: >
              hello world from Template Interceptor,
              sequence number is {{ headers["x-ph-seq"] }}
              and was generated at {{ headers.generatedAt }}
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: moderator
      id: moderator
      image: moderator:latest
      work:
        in:
          in: gen
        out:
          out: mod
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
      work:
        in:
          in: mod
        out:
          out: final
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: final
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: moderator, port: in }
    - id: e2
      from: { beeId: moderator, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
