id: templated-rest
name: Local REST - Templated Generator
description: Uses local images. Sample scenario that enables the templating
  interceptor for the generator.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 5
            maxMessages: 0
        interceptors:
          templating:
            template: >
              hello world from Template Interceptor, sequence number is {{
              headers["x-ph-seq"] }} and was generated at {{ headers.generatedAt
              }}
        message:
          bodyType: HTTP
          path: /api/guarded
          method: POST
          body: "{{ payload }}"
          headers:
            content-type: text/plain
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: gen
        out:
          out: mod
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: mod
        out:
          out: final
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: final
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: moderator }
    - id: e2
      from: { port: out, role: moderator }
      to: { port: in, role: processor }
    - id: e3
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
