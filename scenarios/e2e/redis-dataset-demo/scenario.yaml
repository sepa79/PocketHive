id: redis-dataset-demo
name: Redis dataset demo (generator + per-customer lists)
description: Seeds Redis with randomised payloads and runs two low-rate data providers that each drain their own list.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        outputs:
          type: NONE
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 5
        worker:
          message:
            bodyType: SIMPLE
            body: |
              {% set cust = pickWeighted('custA', 1, 'custB', 1) %}
              {% set card = eval("#randLong('4000000000000000','4999999999999999')") %}
              {"customerCode":"{{ cust }}",
              "accountNumber":"{{ eval('#randInt(10000000,99999999)') }}",
              "cardNumber":"{{ card }}",
              "nonce":"{{ eval('#uuid()') }}"}
        interceptors:
          redisUploader:
            enabled: true
            host: redis
            port: 6379
            phase: AFTER
            sourceStep: LAST
            pushDirection: RPUSH
            routes:
              - match: '"customerCode"\s*:\s*"custA"'
                list: ph:dataset:custa
              - match: '"customerCode"\s*:\s*"custB"'
                list: ph:dataset:custb
            defaultList: ph:dataset:other
      work: {}

    - role: dataProviderA
      id: dataprovidera
      image: generator:latest
      config:
        inputs:
          type: REDIS_DATASET
          redis:
            host: redis
            port: 6379
            listName: ph:dataset:custa
            ratePerSec: 5
        worker:
          message:
            bodyType: SIMPLE
            body: "{{ payload }}"
            headers:
              content-type: application/json
              x-ph-call-id: "{{ pickWeighted('redis-auth', 50, 'redis-balance', 30, 'redis-topup', 20) }}"
      work:
        out:
          out: http-build
      ports:
        - { id: out, direction: out }
    - role: dataProviderB
      id: dataproviderb
      image: generator:latest
      config:
        inputs:
          type: REDIS_DATASET
          redis:
            host: redis
            port: 6379
            listName: ph:dataset:custb
            ratePerSec: 5
        worker:
          message:
            bodyType: SIMPLE
            body: "{{ payload }}"
            headers:
              content-type: application/json
              x-ph-call-id: "{{ pickWeighted('redis-balance', 40, 'redis-topup', 40, 'redis-auth', 20) }}"
      work:
        out:
          out: http-build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      id: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/http
        serviceId: default
      work:
        in:
          in: http-build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: dataprovidera, port: out }
      to: { beeId: request-builder, port: in }
    - id: e2
      from: { beeId: dataproviderb, port: out }
      to: { beeId: request-builder, port: in }
    - id: e3
      from: { beeId: request-builder, port: out }
      to: { beeId: processor, port: in }
    - id: e4
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
