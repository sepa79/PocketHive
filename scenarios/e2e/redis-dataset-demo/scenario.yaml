id: redis-dataset-demo
name: Redis dataset demo (generator + per-customer lists)
description: Seeds Redis with randomised payloads and runs two low-rate data
  providers that each drain their own list.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        outputs:
          type: NONE
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 5
            maxMessages: 0
        interceptors:
          redisUploader:
            enabled: true
            host: redis
            port: 6379
            ssl: false
            phase: AFTER
            sourceStep: LAST
            pushDirection: RPUSH
            maxLen: -1
            routes:
              - match: '"customerCode"\s*:\s*"custA"'
                list: ph:dataset:custa
              - match: '"customerCode"\s*:\s*"custB"'
                list: ph:dataset:custb
            defaultList: ph:dataset:other
        message:
          bodyType: SIMPLE
          body: |
            {% set cust = pickWeighted('custA', 1, 'custB', 1) %}
            {% set card = eval("#randLong('4000000000000000','4999999999999999')") %}
            {"customerCode":"{{ cust }}",
            "accountNumber":"{{ eval('#randInt(10000000,99999999)') }}",
            "cardNumber":"{{ card }}",
            "nonce":"{{ eval('#uuid()') }}"}
      work: {}

    - role: dataprovidera
      image: generator:latest
      config:
        inputs:
          type: REDIS_DATASET
          redis:
            host: redis
            port: 6379
            listName: ph:dataset:custa
            ratePerSec: 5
            ssl: false
            sources: []
            pickStrategy: ROUND_ROBIN
        message:
          bodyType: SIMPLE
          body: "{{ payload }}"
          headers:
            content-type: application/json
            x-ph-call-id: "{{ pickWeighted('redis-auth', 50, 'redis-balance', 30,
              'redis-topup', 20) }}"
      work:
        out:
          out: http-build
      ports:
        - { id: out, direction: out }
    - role: dataproviderb
      image: generator:latest
      config:
        inputs:
          type: REDIS_DATASET
          redis:
            host: redis
            port: 6379
            listName: ph:dataset:custb
            ratePerSec: 5
            ssl: false
            sources: []
            pickStrategy: ROUND_ROBIN
        message:
          bodyType: SIMPLE
          body: "{{ payload }}"
          headers:
            content-type: application/json
            x-ph-call-id: "{{ pickWeighted('redis-balance', 40, 'redis-topup', 40,
              'redis-auth', 20) }}"
      work:
        out:
          out: http-build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/http
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: http-build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: dataprovidera }
      to: { port: in, role: request-builder }
    - id: e2
      from: { port: out, role: dataproviderb }
      to: { port: in, role: request-builder }
    - id: e3
      from: { port: out, role: request-builder }
      to: { port: in, role: processor }
    - id: e4
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
