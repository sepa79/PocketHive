id: remote-registry-smoke
name: Remote Registry Smoke
description: Remote smoke scenario using the deployment-selected image tag.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1.0
        message:
          bodyType: HTTP
          path: /api/test
          method: POST
          body: hello-world
          headers: {}
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
      work:
        in:
          in: gen
        out:
          out: final
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: final
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: processor, port: in }
    - id: e2
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
