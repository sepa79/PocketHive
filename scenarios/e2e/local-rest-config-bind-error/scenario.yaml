protocolVersion: "2.0.0"
id: local-rest-worker-crash
name: Local REST - Worker Crash
description: Intentionally broken e2e scenario. Generator gets invalid
  JAVA_TOOL_OPTIONS so the worker process dies during startup and swarm
  bootstrap should stall waiting for healthy workers.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      env:
        JAVA_TOOL_OPTIONS: "-XX:ThisOptionDoesNotExist"
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 50
            maxMessages: 0
        message:
          bodyType: HTTP
          path: /test
          method: POST
          body: '{"event":"local-rest-worker-crash"}'
          headers:
            content-type: application/json
      work:
        out:
          out: genQ
      ports:
        - { id: out, direction: out }
    - role: moderator
      image: moderator:latest
      config:
        mode:
          type: rate-per-sec
          ratePerSec: 10
      work:
        in:
          in: genQ
        out:
          out: modQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: modQ
        out:
          out: finalQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: finalQ
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: moderator }
    - id: e2
      from: { port: out, role: moderator }
      to: { port: in, role: processor }
    - id: e3
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
