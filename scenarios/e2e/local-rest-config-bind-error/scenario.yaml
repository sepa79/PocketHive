id: local-rest-worker-crash
name: Local REST - Worker Crash
description: Intentionally broken e2e scenario. Generator gets invalid JAVA_TOOL_OPTIONS so the worker process dies during startup and swarm bootstrap should stall waiting for healthy workers.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      env:
        JAVA_TOOL_OPTIONS: "-XX:ThisOptionDoesNotExist"
      config:
        inputs:
          scheduler:
            ratePerSec: 50
        worker:
          message:
            bodyType: HTTP
            path: /test
            method: POST
            body: '{"event":"local-rest-worker-crash"}'
            headers:
              content-type: application/json
      work:
        out:
          out: genQ
    - role: moderator
      image: moderator:latest
      config:
        worker:
          mode:
            type: rate-per-sec
            ratePerSec: 10
      work:
        in:
          in: genQ
        out:
          out: modQ
    - role: processor
      image: processor:latest
      config:
        worker:
          baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
      work:
        in:
          in: modQ
        out:
          out: finalQ
    - role: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: finalQ
