id: local-rest-worker-crash
name: Local REST - Worker Crash
description: Intentionally broken e2e scenario. Generator gets invalid
  JAVA_TOOL_OPTIONS so the worker process dies during startup and swarm
  bootstrap should stall waiting for healthy workers.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      env:
        JAVA_TOOL_OPTIONS: "-XX:ThisOptionDoesNotExist"
      config:
        inputs:
          scheduler:
            ratePerSec: 50
        message:
          bodyType: HTTP
          path: /test
          method: POST
          body: '{"event":"local-rest-worker-crash"}'
          headers:
            content-type: application/json
      work:
        out:
          out: genQ
      ports:
        - { id: out, direction: out }
    - role: moderator
      id: moderator
      image: moderator:latest
      config:
        mode:
          type: rate-per-sec
          ratePerSec: 10
      work:
        in:
          in: genQ
        out:
          out: modQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
      work:
        in:
          in: modQ
        out:
          out: finalQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: finalQ
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: moderator, port: in }
    - id: e2
      from: { beeId: moderator, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
