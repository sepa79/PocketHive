id: auth-proving-failure
name: Auth Proving - Failure Dedupe
description: Proves auth failures fail explicitly and are bounded/redacted when
  the same worker repeats the same auth error.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 3
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-failure","call":"bad-query-auth"}'
          headers:
            content-type: application/json
            x-ph-call-id: bad-query-auth
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/http
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: request-builder }
    - id: e2
      from: { port: out, role: request-builder }
      to: { port: in, role: processor }
    - id: e3
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
