id: local-rest-invalid-volume-template
name: Local REST - Invalid Volume Template
description: Intentionally broken e2e scenario. Generator declares an invalid
  docker volume spec so swarm provisioning should fail before the worker starts.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        docker:
          volumes:
            - ":/app/invalid"
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 50
            maxMessages: 0
        message:
          bodyType: HTTP
          path: /test
          method: POST
          body: '{"event":"local-rest-invalid-volume-template"}'
          headers:
            content-type: application/json
      work:
        out:
          out: genQ
      ports:
        - { id: out, direction: out }
    - role: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: genQ
        out:
          out: modQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: modQ
        out:
          out: finalQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: finalQ
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: moderator }
    - id: e2
      from: { port: out, role: moderator }
      to: { port: in, role: processor }
    - id: e3
      from: { port: out, role: processor }
      to: { port: in, role: postprocessor }
