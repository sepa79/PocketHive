id: local-rest
name: Local REST - Simple REST Swarm using custom values
description: Uses local images. Sample scenario that ships the REST generator
  with a 50 msg/s default rate limit and custom queue names.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          scheduler:
            ratePerSec: 50
        message:
          bodyType: HTTP
          path: /test
          method: POST
          body: '{"event":"local-rest"}'
          headers:
            content-type: application/json
      work:
        out:
          out: genQ
      ports:
        - { id: out, direction: out }
    - role: moderator
      id: moderator
      image: moderator:latest
      config:
        mode:
          type: rate-per-sec
          ratePerSec: 10
      work:
        in:
          in: genQ
        out:
          out: modQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
      work:
        in:
          in: modQ
        out:
          out: finalQ
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: finalQ
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: moderator, port: in }
    - id: e2
      from: { beeId: moderator, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
