id: http-proxy-demo
name: HTTP Proxy Demo
description: Routes processor HTTP traffic through the managed proxy authority.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          scheduler:
            ratePerSec: 5
        message:
          bodyType: HTTP
          path: /test
          method: POST
          body: '{"event":"http-proxy-demo"}'
          headers:
            content-type: application/json
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: moderator
      id: moderator
      image: moderator:latest
      work:
        in:
          in: gen
        out:
          out: mod
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
      work:
        in:
          in: mod
        out:
          out: final
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: final
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: moderator, port: in }
    - id: e2
      from: { beeId: moderator, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
