id: auth-proving-http-request-builder
name: Auth Proving - HTTP Request Builder
description: Proves request-builder HTTP authRef application for OAuth, static
  bearer, basic, API key, query token, HMAC, and AWS signing.
template:
  image: swarm-controller:latest
  bees:
    - role: gen-oauth-client
      id: gen-oauth-client
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 0
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-request-builder","call":"oauth-client"}'
          headers:
            content-type: application/json
            x-ph-call-id: oauth-client
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: gen-oauth-password
      id: gen-oauth-password
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 0
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-request-builder","call":"oauth-password"}'
          headers:
            content-type: application/json
            x-ph-call-id: oauth-password
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: gen-static-bearer
      id: gen-static-bearer
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 0
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-request-builder","call":"static-bearer"}'
          headers:
            content-type: application/json
            x-ph-call-id: static-bearer
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: gen-basic
      id: gen-basic
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 0
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-request-builder","call":"basic-auth"}'
          headers:
            content-type: application/json
            x-ph-call-id: basic-auth
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: gen-api-key
      id: gen-api-key
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 0
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-request-builder","call":"api-key"}'
          headers:
            content-type: application/json
            x-ph-call-id: api-key
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: gen-query-token
      id: gen-query-token
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 0
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-request-builder","call":"query-token"}'
          headers:
            content-type: application/json
            x-ph-call-id: query-token
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: gen-hmac
      id: gen-hmac
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 0
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-request-builder","call":"hmac"}'
          headers:
            content-type: application/json
            x-ph-call-id: hmac
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: gen-aws
      id: gen-aws
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 0
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-http-request-builder","call":"aws"}'
          headers:
            content-type: application/json
            x-ph-call-id: aws
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      id: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/http
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: gen-oauth-client, port: out }
      to: { beeId: request-builder, port: in }
    - id: e2
      from: { beeId: gen-oauth-password, port: out }
      to: { beeId: request-builder, port: in }
    - id: e3
      from: { beeId: gen-static-bearer, port: out }
      to: { beeId: request-builder, port: in }
    - id: e4
      from: { beeId: gen-basic, port: out }
      to: { beeId: request-builder, port: in }
    - id: e5
      from: { beeId: gen-api-key, port: out }
      to: { beeId: request-builder, port: in }
    - id: e6
      from: { beeId: gen-query-token, port: out }
      to: { beeId: request-builder, port: in }
    - id: e7
      from: { beeId: gen-hmac, port: out }
      to: { beeId: request-builder, port: in }
    - id: e8
      from: { beeId: gen-aws, port: out }
      to: { beeId: request-builder, port: in }
    - id: e9
      from: { beeId: request-builder, port: out }
      to: { beeId: processor, port: in }
    - id: e10
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
