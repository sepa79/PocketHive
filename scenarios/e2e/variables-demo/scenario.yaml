id: variables-demo
name: Scenario Variables Demo (vars.* + eval)
description: Demonstrates Scenario Variables injected as config.vars -> WorkItem
  header vars -> Pebble/SpEL usage.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 2
            maxMessages: 5
        message:
          bodyType: HTTP
          path: /test
          method: POST
          body: |
            {
              "customerId": "{{ vars.customerId }}",
              "loopCount": {{ vars.loopCount }},
              "loopPlusOne": {{ eval("vars.loopCount + 1") }},
              "enableFoo": {{ vars.enableFoo }},
              "profile": "{{ vars.profile }}"
            }
          headers:
            content-type: application/json
            x-ph-customer-id: "{{ vars.customerId }}"
            x-ph-loop-plus-one: "{{ eval(\"vars.loopCount + 1\") }}"
      work:
        out:
          out: gen
      ports:
        - { id: out, direction: out }
    - role: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: gen
        out:
          out: mod
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: mod
        out:
          out: final
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: generator }
      to: { port: in, role: moderator }
    - id: e2
      from: { port: out, role: moderator }
      to: { port: in, role: processor }
