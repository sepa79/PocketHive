protocolVersion: "2.0.0"
id: auth-proving-tcp-iso-mtls
name: Auth Proving - TCP ISO8583 mTLS
description: Proves TCP payload auth, ISO8583 MAC application, and
  processor-stage mTLS client certificate auth metadata.
template:
  image: swarm-controller:latest
  bees:
    - role: gen-tcp-prefix
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 1
        message:
          bodyType: SIMPLE
          body: 'PAYLOAD|tcp-prefix|AUTH-PROOF'
          headers:
            x-ph-call-id: tcp-prefix
      work:
        out:
          out: build-tcp
      ports:
        - { id: out, direction: out }
    - role: rb-tcp-prefix
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build-tcp
        out:
          out: proc-tcp
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: proc-tcp-prefix
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        tcpTransport:
          type: socket
          connectionReuse: NONE
          maxRetries: 1
          connectTimeoutMs: 2000
          readTimeoutMs: 3000
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc-tcp
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: gen-iso-mac
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 1
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-tcp-iso-mtls","call":"iso-mac"}'
          headers:
            x-ph-call-id: iso-mac
      work:
        out:
          out: build-iso
      ports:
        - { id: out, direction: out }
    - role: rb-iso-mac
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build-iso
        out:
          out: proc-iso
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: proc-iso-mac
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcp-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        tcpTransport:
          type: socket
          connectionReuse: NONE
          maxRetries: 1
          connectTimeoutMs: 2000
          readTimeoutMs: 3000
          maxBytes: 8192
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc-iso
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: gen-mtls
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 1
        message:
          bodyType: SIMPLE
          body: '{"sessionId":"MTLS-AUTH-PROOF","timestamp":"2026-05-08T00:00:00Z","encryptedData":"dummy","signature":"dummy"}'
          headers:
            x-ph-call-id: mtls-secure
      work:
        out:
          out: build-mtls
      ports:
        - { id: out, direction: out }
    - role: rb-mtls
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/tcp
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build-mtls
        out:
          out: proc-mtls
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: proc-mtls
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['tcps-server'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
        tcpTransport:
          type: socket
          connectionReuse: NONE
          maxRetries: 1
          connectTimeoutMs: 5000
          readTimeoutMs: 8000
          sslVerify: false
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: proc-mtls
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { port: out, role: gen-tcp-prefix }
      to: { port: in, role: rb-tcp-prefix }
    - id: e2
      from: { port: out, role: rb-tcp-prefix }
      to: { port: in, role: proc-tcp-prefix }
    - id: e3
      from: { port: out, role: proc-tcp-prefix }
      to: { port: in, role: postprocessor }
    - id: e4
      from: { port: out, role: gen-iso-mac }
      to: { port: in, role: rb-iso-mac }
    - id: e5
      from: { port: out, role: rb-iso-mac }
      to: { port: in, role: proc-iso-mac }
    - id: e6
      from: { port: out, role: proc-iso-mac }
      to: { port: in, role: postprocessor }
    - id: e7
      from: { port: out, role: gen-mtls }
      to: { port: in, role: rb-mtls }
    - id: e8
      from: { port: out, role: rb-mtls }
      to: { port: in, role: proc-mtls }
    - id: e9
      from: { port: out, role: proc-mtls }
      to: { port: in, role: postprocessor }
