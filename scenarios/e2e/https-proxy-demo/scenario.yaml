id: https-proxy-demo
name: HTTPS Proxy Demo
description: Routes processor HTTPS traffic through the managed proxy authority with TLS verification disabled.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          scheduler:
            ratePerSec: 5
        worker:
          message:
            bodyType: HTTP
            path: /test
            method: POST
            body: '{"event":"https-proxy-demo"}'
            headers:
              content-type: application/json
      work:
        out:
          out: gen
    - role: moderator
      image: moderator:latest
      work:
        in:
          in: gen
        out:
          out: mod
    - role: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
        sslVerify: false
      work:
        in:
          in: mod
        out:
          out: final
    - role: postprocessor
      image: postprocessor:latest
      work:
        in:
          in: final
