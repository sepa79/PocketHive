id: auth-proving-profile-collision
name: Auth Proving - Profile Collision
description: Proves shared Redis token keys with different resolved auth profile
  config fail explicitly, do not send traffic, and do not spam the journal.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      id: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 1
            maxMessages: 3
        message:
          bodyType: SIMPLE
          body: '{"scenario":"auth-proving-profile-collision","call":"token-key-collision"}'
          headers:
            content-type: application/json
            x-ph-call-id: token-key-collision
      work:
        out:
          out: build
      ports:
        - { id: out, direction: out }
    - role: request-builder
      id: request-builder
      image: request-builder:latest
      config:
        templateRoot: /app/scenario/templates/http
        serviceId: default
        passThroughOnMissingTemplate: false
      work:
        in:
          in: build
        out:
          out: proc
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: processor
      id: processor
      image: processor:latest
      config:
        baseUrl: "{{ sut.endpoints['default'].baseUrl }}"
        mode: THREAD_COUNT
        threadCount: 1
      work:
        in:
          in: proc
        out:
          out: post
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
    - role: postprocessor
      id: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: post
      ports:
        - { id: in, direction: in }

topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: generator, port: out }
      to: { beeId: request-builder, port: in }
    - id: e2
      from: { beeId: request-builder, port: out }
      to: { beeId: processor, port: in }
    - id: e3
      from: { beeId: processor, port: out }
      to: { beeId: postprocessor, port: in }
