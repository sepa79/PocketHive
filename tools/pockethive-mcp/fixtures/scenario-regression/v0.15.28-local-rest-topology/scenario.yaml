protocolVersion: "2.0.0"
id: local-rest-topology-regression
name: Local REST legacy topology regression
description: Source-derived from v0.15.28 scenarios/bundles/local-rest-topology/scenario.yaml.
template:
  image: swarm-controller:latest
  bees:
    - id: genA
      role: generator
      image: generator:latest
      ports:
        - { id: out, direction: out }
      config:
        inputs:
          scheduler:
            ratePerSec: 50
        worker:
          message:
            bodyType: HTTP
            path: /test
            method: POST
            body: '{"event":"local-rest"}'
            headers:
              content-type: application/json
      work:
        out: { out: genQ }
    - id: procA
      role: processor
      image: processor:latest
      ports:
        - { id: in, direction: in }
        - { id: out, direction: out }
      config:
        worker:
          baseUrl: "{{ sut.endpoints['default'].baseUrl }}/api"
      work:
        in: { in: genQ }
        out: { out: finalQ }
    - id: postA
      role: postprocessor
      image: postprocessor:latest
      ports:
        - { id: in, direction: in }
      work:
        in: { in: finalQ }
topology:
  version: 1
  edges:
    - id: e1
      from: { beeId: genA, port: out }
      to: { beeId: procA, port: in }
    - id: e2
      from: { beeId: procA, port: out }
      to: { beeId: postA, port: in }
