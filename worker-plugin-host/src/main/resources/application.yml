pockethive:
  plugin-host:
    plugins-dir: ${POCKETHIVE_PLUGIN_DIR:/opt/pockethive/plugins}
  worker:
    inputs:
      autowire: ${POCKETHIVE_WORKER_INPUT_AUTOWIRE:true}
  outputs:
    rabbit:
      exchange: ${POCKETHIVE_OUTPUT_RABBIT_EXCHANGE}
      routingKey: ${POCKETHIVE_OUTPUT_RABBIT_ROUTING_KEY}
  control-plane:
    exchange: ${POCKETHIVE_CONTROL_PLANE_EXCHANGE:ph.control}
    swarm-id: ${POCKETHIVE_CONTROL_PLANE_SWARM_ID:hive}
    instance-id: ${POCKETHIVE_CONTROL_PLANE_INSTANCE_ID:worker-plugin-host}
    control-queue-prefix: ${POCKETHIVE_CONTROL_PLANE_CONTROL_QUEUE_PREFIX:ph.control}
    worker:
      role: ${POCKETHIVE_CONTROL_PLANE_WORKER_ROLE:generator}
      skip-self-signals: ${POCKETHIVE_CONTROL_PLANE_WORKER_SKIP_SELF_SIGNALS:false}
    manager:
      enabled: false

logging:
  level:
    io.pockethive.worker.plugin.host: INFO

management:
  prometheus:
    metrics:
      export:
        pushgateway:
          enabled: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_PUSHGATEWAY_ENABLED:true}
          base-url: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_PUSHGATEWAY_BASE_URL:http://pushgateway:9091}
          push-rate: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_PUSHGATEWAY_PUSH_RATE:PT30S}
          job: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_PUSHGATEWAY_JOB:worker-plugin-host}
          shutdown-operation: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_PUSHGATEWAY_SHUTDOWN_OPERATION:DELETE}
          grouping-key:
            instance: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_PUSHGATEWAY_GROUPING_KEY_INSTANCE:${POCKETHIVE_CONTROL_PLANE_INSTANCE_ID:worker-plugin-host}}
