# HiveForge Swarm deployment override.
#
# Use with docker-compose.yml for the portable swarm-reduced runtime shape.
# HIVEFORGE_BIND_SOURCE_DIR is the host-visible HiveForge-managed deployment
# directory. All bind mounts must resolve under that shared root.

x-storage-placement: &storage-placement {}

x-scenarios-placement: &scenarios-placement {}

x-manager-scenarios-placement: &manager-scenarios-placement
  placement:
    constraints:
      - node.role == manager

x-sut-placement: &sut-placement
  placement:
    constraints:
      - node.labels.pockethive.sut == true

x-proxy-placement: &proxy-placement
  placement:
    constraints:
      - node.labels.pockethive.proxy == true

x-manager-placement: &manager-placement
  placement:
    constraints:
      - node.role == manager

services:
  rabbitmq:
    ports: !override
      - target: 5672
        published: 5672
        protocol: tcp
      - target: 15672
        published: 15672
        protocol: tcp
      - target: 15674
        published: 15674
        protocol: tcp
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/rabbitmq/data:/var/lib/rabbitmq
    deploy: *storage-placement

  postgres:
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pockethive -d pockethive -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy: *storage-placement

  clickhouse:
    ports: !override
      - target: 8123
        published: 8123
        protocol: tcp
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/clickhouse/data:/var/lib/clickhouse
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/clickhouse/clickhouse-entrypoint.sh:/opt/pockethive/clickhouse-entrypoint.sh:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/clickhouse/migrate-tx-outcome-v1-to-v2.sh:/opt/pockethive/migrate-tx-outcome-v1-to-v2.sh:ro
    deploy:
      <<: *storage-placement

  prometheus:
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/prometheus/data:/prometheus
    deploy: *storage-placement

  grafana:
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/grafana/data:/var/lib/grafana
    deploy: *storage-placement

  loki:
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/loki/config.yml:/etc/loki/config.yml:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/loki/data:/var/lib/loki
    deploy: *storage-placement

  scenario-manager:
    depends_on: !override
      - log-aggregator
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      POCKETHIVE_AUTH_SERVICE_URL: http://auth-service:8080
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_PUSHGATEWAY_BASE_URL: http://pushgateway:9091
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/scenarios:/app/scenarios
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/scenario-manager/capabilities:/app/capabilities:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/scenario-manager/network:/app/network:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/scenario-manager/sut:/app/sut:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/scenarios-runtime:/app/scenarios-runtime
    deploy: *scenarios-placement

  orchestrator:
    depends_on: !override
      - rabbitmq
      - log-aggregator
      - postgres
      - network-proxy-manager
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      POCKETHIVE_AUTH_SERVICE_URL: http://auth-service:8080
      POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_SCENARIO_MANAGER_URL: http://scenario-manager:8080
      POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_NETWORK_PROXY_MANAGER_URL: http://network-proxy-manager:8080
      POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_DOCKER_COMPUTE_ADAPTER: SWARM_STACK
      POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_IMAGE_REPOSITORY_PREFIX: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_IMAGE_REPOSITORY_PREFIX:?set registry image prefix}
      POCKETHIVE_SCENARIOS_RUNTIME_ROOT: ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/scenarios-runtime
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pockethive
      POCKETHIVE_SINK_CLICKHOUSE_ENDPOINT: http://clickhouse:8123
    volumes: !override
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/scenarios-runtime:/app/scenarios-runtime
    deploy: *manager-scenarios-placement

  wiremock:
    ports: !override
      - target: 8080
        published: 8080
        protocol: tcp
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/wiremock/mappings:/home/wiremock/mappings
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/wiremock/__files:/home/wiremock/__files
    deploy:
      <<: *sut-placement

  tcp-mock-server:
    ports: !override
      - target: 8080
        published: 8083
        protocol: tcp
      - target: 9090
        published: 9090
        protocol: tcp
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/tcp-mock/mappings:/app/mappings:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/tcp-mock/__files:/app/__files:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/tcp-mock/data:/app/data
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
    deploy:
      <<: *sut-placement

  tcp-mock-server-tls:
    ports: !override
      - target: 8080
        published: 8084
        protocol: tcp
      - target: 9090
        published: 9091
        protocol: tcp
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/tcp-mock/mappings:/app/mappings:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/tcp-mock/__files:/app/__files:ro
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/tcp-mock/tls-data:/app/data
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
    deploy:
      <<: *sut-placement

  haproxy:
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/haproxy/runtime:/opt/haproxy-runtime
    deploy:
      <<: *proxy-placement

  network-proxy-manager:
    depends_on: !override
      - scenario-manager
      - toxiproxy
      - haproxy
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/state/haproxy/runtime:/opt/haproxy-runtime
    environment:
      POCKETHIVE_AUTH_SERVICE_URL: http://auth-service:8080
      POCKETHIVE_NETWORK_PROXY_MANAGER_SCENARIO_MANAGER_URL: http://scenario-manager:8080
      POCKETHIVE_NETWORK_PROXY_MANAGER_TOXIPROXY_URL: http://toxiproxy:8474
      POCKETHIVE_NETWORK_PROXY_MANAGER_HAPROXY_BACKEND_HOST: toxiproxy
    deploy: *proxy-placement

  auth-service:
    deploy: *manager-placement

  log-aggregator:
    depends_on: !override
      - rabbitmq
      - loki
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      POCKETHIVE_LOKI_URL: http://loki:3100
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_PUSHGATEWAY_BASE_URL: http://pushgateway:9091
    deploy: *manager-placement

  pushgateway:
    deploy: *manager-placement

  redis:
    ports: !override
      - target: 6379
        published: 6379
        protocol: tcp
    deploy:
      <<: *proxy-placement

  redis-commander:
    depends_on: !override
      - redis
    environment:
      REDIS_HOSTS: local:redis:6379
    deploy: *manager-placement

  toxiproxy:
    deploy: *proxy-placement

  ui:
    depends_on: !override
      - scenario-manager
    ports: !override
      - target: 8088
        published: 8088
        protocol: tcp
    volumes: !override
      - ${HIVEFORGE_BIND_SOURCE_DIR:?set HiveForge bind source dir}/artifacts/runtime/config/nginx/nginx.swarm.conf:/etc/nginx/conf.d/default.conf:ro
    deploy: *proxy-placement

  ui-v2:
    depends_on: !override
      - ui
    deploy: *manager-placement
