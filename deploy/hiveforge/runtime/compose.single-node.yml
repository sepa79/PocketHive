# Remote single-node PocketHive deployment override for a Docker host.
#
# Use with docker-compose.yml and an explicit env file. This keeps the first
# remote runtime on DOCKER_SINGLE while all PocketHive-owned images come from
# the explicitly configured registry.

services:
  clickhouse:
    # Keep only the HTTP API published for diagnostics/E2E. Native port 9000 is
    # deliberately not published because Portainer owns that port in the Swarm.
    ports: !override
      - "8123:8123"

  orchestrator:
    environment:
      POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_DOCKER_COMPUTE_ADAPTER: DOCKER_SINGLE
      POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_IMAGE_REPOSITORY_PREFIX: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_IMAGE_REPOSITORY_PREFIX:?set registry image prefix}
      POCKETHIVE_SCENARIOS_RUNTIME_ROOT: ${POCKETHIVE_SCENARIOS_RUNTIME_ROOT:?set host runtime root}

  scenario-manager:
    environment:
      POCKETHIVE_IMAGES_DEFAULT_TAG: ${POCKETHIVE_VERSION:?set image tag}
