# HiveForge Swarm full-profile storage override.
#
# Use on top of docker-compose.yml and deploy/hiveforge/runtime/compose.swarm.yml.
# Dedicated data directories leave the shared HiveForge project root. HiveForge
# must not create or mutate those paths; the placement labels below must point
# at nodes that already have the declared directories mounted.

x-rabbitmq-placement: &rabbitmq-placement
  placement:
    constraints:
      - node.labels.pockethive.rabbitmq == true

x-postgres-placement: &postgres-placement
  placement:
    constraints:
      - node.labels.pockethive.postgres == true

x-clickhouse-placement: &clickhouse-placement
  placement:
    constraints:
      - node.labels.pockethive.clickhouse == true

x-prometheus-placement: &prometheus-placement
  placement:
    constraints:
      - node.labels.pockethive.prometheus == true

x-loki-placement: &loki-placement
  placement:
    constraints:
      - node.labels.pockethive.loki == true

x-redis-placement: &redis-placement
  placement:
    constraints:
      - node.labels.pockethive.redis == true

services:
  rabbitmq:
    volumes: !override
      - ${HIVEFORGE_PROJECT_DIR:?set HiveForge project dir}/artifacts/pockethive-runtime/config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ${HIVEFORGE_PROJECT_DIR:?set HiveForge project dir}/artifacts/pockethive-runtime/config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ${POCKETHIVE_RABBITMQ_ROOT:?set RabbitMQ root}/data:/var/lib/rabbitmq
    deploy: !override
      <<: *rabbitmq-placement

  postgres:
    volumes: !override
      - ${POCKETHIVE_POSTGRES_ROOT:?set Postgres root}/data:/var/lib/postgresql/data
    deploy: !override
      <<: *postgres-placement

  clickhouse:
    volumes: !override
      - ${POCKETHIVE_CLICKHOUSE_ROOT:?set ClickHouse root}/data:/var/lib/clickhouse
      - ${HIVEFORGE_PROJECT_DIR:?set HiveForge project dir}/artifacts/pockethive-runtime/config/clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ${HIVEFORGE_PROJECT_DIR:?set HiveForge project dir}/artifacts/pockethive-runtime/config/clickhouse/clickhouse-entrypoint.sh:/opt/pockethive/clickhouse-entrypoint.sh:ro
      - ${HIVEFORGE_PROJECT_DIR:?set HiveForge project dir}/artifacts/pockethive-runtime/config/clickhouse/migrate-tx-outcome-v1-to-v2.sh:/opt/pockethive/migrate-tx-outcome-v1-to-v2.sh:ro
    deploy: !override
      <<: *clickhouse-placement

  prometheus:
    volumes: !override
      - ${HIVEFORGE_PROJECT_DIR:?set HiveForge project dir}/artifacts/pockethive-runtime/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${POCKETHIVE_PROMETHEUS_ROOT:?set Prometheus root}/data:/prometheus
    deploy: !override
      <<: *prometheus-placement

  loki:
    volumes: !override
      - ${HIVEFORGE_PROJECT_DIR:?set HiveForge project dir}/artifacts/pockethive-runtime/config/loki/config.yml:/etc/loki/config.yml:ro
      - ${POCKETHIVE_LOKI_ROOT:?set Loki root}/data:/var/lib/loki
    deploy: !override
      <<: *loki-placement

  redis:
    volumes: !override
      - ${POCKETHIVE_REDIS_ROOT:?set Redis root}/data:/data
    deploy: !override
      <<: *redis-placement
