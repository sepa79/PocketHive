---
- name: Update PocketHive stack
  hosts: localhost
  gather_facts: false
  vars:
    pockethive_repo_root: "{{ playbook_dir }}/../../../../"
    hiveforge_root: /hf
    pockethive_profile: "{{ lookup('env', 'HIVEFORGE_PROFILE') }}"
    pockethive_rendered_compose_file: "{{ hiveforge_root }}/stacks/compose.yml"
    pockethive_bind_source_dir: "{{ lookup('env', 'HIVEFORGE_BIND_SOURCE_DIR') }}"
    pockethive_docker_registry: "{{ lookup('env', 'DOCKER_REGISTRY') }}"
    pockethive_version: "{{ lookup('env', 'POCKETHIVE_VERSION') }}"
    pockethive_image_repository_prefix: "{{ lookup('env', 'POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_IMAGE_REPOSITORY_PREFIX') }}"
    pockethive_rabbitmq_root: "{{ lookup('env', 'POCKETHIVE_RABBITMQ_ROOT') }}"
    pockethive_postgres_root: "{{ lookup('env', 'POCKETHIVE_POSTGRES_ROOT') }}"
    pockethive_clickhouse_root: "{{ lookup('env', 'POCKETHIVE_CLICKHOUSE_ROOT') }}"
    pockethive_redis_root: "{{ lookup('env', 'POCKETHIVE_REDIS_ROOT') }}"
  tasks:
    - name: Require explicit HiveForge profile
      ansible.builtin.assert:
        that:
          - pockethive_profile in ["single-full", "swarm-reduced", "swarm-full"]
        fail_msg: "PocketHive HiveForge update supports HIVEFORGE_PROFILE=single-full, HIVEFORGE_PROFILE=swarm-reduced, or HIVEFORGE_PROFILE=swarm-full."

    - name: Reject single-full until HiveForge owns local Docker Compose execution
      ansible.builtin.fail:
        msg: "PocketHive single-full requires HiveForge-owned Docker Compose execution; project Ansible has no Docker access in contract 0.5."
      when: pockethive_profile == "single-full"

    - name: Render PocketHive swarm compose for HiveForge-owned Docker deploy
      ansible.builtin.include_tasks: swarm-stack.yml
      when: pockethive_profile in ["swarm-reduced", "swarm-full"]
