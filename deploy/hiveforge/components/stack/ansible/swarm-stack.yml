---
- name: Select HiveForge-managed state for swarm-reduced
  ansible.builtin.set_fact:
    pockethive_swarm_state_dirs:
      - state/rabbitmq/data
      - state/postgres/data
      - state/clickhouse/data
      - state/grafana/data
      - state/scenarios-runtime
      - state/tcp-mock/data
      - state/tcp-mock/tls-data
      - state/haproxy/runtime
    pockethive_swarm_owned_state_dirs:
      - path: state/grafana/data
        owner: "472"
        group: "0"
  when: pockethive_profile == "swarm-reduced"

- name: Select HiveForge-managed state for swarm-full
  ansible.builtin.set_fact:
    pockethive_swarm_state_dirs:
      - state/grafana/data
      - state/scenarios-runtime
      - state/tcp-mock/data
      - state/tcp-mock/tls-data
      - state/haproxy/runtime
    pockethive_swarm_owned_state_dirs:
      - path: state/grafana/data
        owner: "472"
        group: "0"
  when: pockethive_profile == "swarm-full"

- name: Require swarm HiveForge runtime environment
  ansible.builtin.assert:
    that:
      - hiveforge_root == "/hf"
      - pockethive_profile in ["swarm-reduced", "swarm-full"]
    fail_msg: "Swarm stack render requires hiveforge_root=/hf and HIVEFORGE_PROFILE=swarm-reduced or HIVEFORGE_PROFILE=swarm-full."

- name: Require HiveForge bind source directory
  ansible.builtin.assert:
    that:
      - pockethive_bind_source_dir | length > 0
      - pockethive_bind_source_dir.startswith("/")
    fail_msg: "HIVEFORGE_BIND_SOURCE_DIR must be an absolute path set by HiveForge for swarm deployments."

- name: Require Docker registry prefix
  ansible.builtin.assert:
    that:
      - pockethive_docker_registry | length > 0
      - pockethive_docker_registry.endswith("/")
    fail_msg: "DOCKER_REGISTRY must be set and include a trailing slash, for example ghcr.io/sepa79/pockethive/."

- name: Require PocketHive image repository prefix
  ansible.builtin.assert:
    that:
      - pockethive_image_repository_prefix | length > 0
    fail_msg: "POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_IMAGE_REPOSITORY_PREFIX must be set in HiveForge runtime env."

- name: Require matching image repository values
  ansible.builtin.assert:
    that:
      - pockethive_docker_registry == pockethive_image_repository_prefix + "/"
    fail_msg: "DOCKER_REGISTRY must equal POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_IMAGE_REPOSITORY_PREFIX plus '/'."

- name: Require PocketHive version
  ansible.builtin.assert:
    that:
      - pockethive_version | length > 0
    fail_msg: "POCKETHIVE_VERSION must be set in HiveForge runtime env."

- name: Require swarm-full dedicated root environment
  ansible.builtin.assert:
    that:
      - item.value | length > 0
      - item.value.startswith("/")
    fail_msg: "{{ item.name }} must be an absolute Docker-daemon host path. HiveForge does not create or chmod dedicated swarm-full mount roots."
  loop:
    - name: POCKETHIVE_RABBITMQ_ROOT
      value: "{{ pockethive_rabbitmq_root }}"
    - name: POCKETHIVE_POSTGRES_ROOT
      value: "{{ pockethive_postgres_root }}"
    - name: POCKETHIVE_CLICKHOUSE_ROOT
      value: "{{ pockethive_clickhouse_root }}"
    - name: POCKETHIVE_REDIS_ROOT
      value: "{{ pockethive_redis_root }}"
  when: pockethive_profile == "swarm-full"

- name: Create HiveForge action-root swarm state directories
  ansible.builtin.file:
    path: "{{ hiveforge_root }}/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ pockethive_swarm_state_dirs }}"

- name: Apply writable ownership for HiveForge action-root state directories
  ansible.builtin.file:
    path: "{{ hiveforge_root }}/{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "0755"
  loop: "{{ pockethive_swarm_owned_state_dirs }}"

- name: Ensure rendered Compose directory exists
  ansible.builtin.file:
    path: "{{ pockethive_rendered_compose_file | dirname }}"
    state: directory
    mode: "0755"

- name: Write rendered Compose file for HiveForge-owned Docker deploy
  ansible.builtin.template:
    src: stack-compose.yml.j2
    dest: "{{ pockethive_rendered_compose_file }}"
    mode: "0644"
  environment:
    HIVEFORGE_BIND_SOURCE_DIR: "{{ pockethive_bind_source_dir }}"

- name: Validate rendered Docker Stack compose
  ansible.builtin.command:
    argv:
      - docker
      - stack
      - config
      - -c
      - "{{ pockethive_rendered_compose_file }}"
  environment:
    HIVEFORGE_BIND_SOURCE_DIR: "{{ pockethive_bind_source_dir }}"
  register: pockethive_stack_compose_validation
  changed_when: false
