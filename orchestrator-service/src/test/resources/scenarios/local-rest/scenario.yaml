protocolVersion: "2.0.0"
id: local-rest
name: Local REST - Test Scenario
description: Test-only scenario for SwarmCreationMock1E2ETest.
template:
  image: swarm-controller:latest
  bees:
    - role: generator
      image: generator:latest
      config:
        inputs:
          type: SCHEDULER
          scheduler:
            ratePerSec: 50
            maxMessages: 0
        message:
          bodyType: HTTP
          path: /api/guarded
          method: POST
          body: guarded-request
          headers: {}
      work:
        out:
          out: gen
    - role: moderator
      image: moderator:latest
      config:
        mode:
          type: pass-through
          ratePerSec: 0.0
      work:
        in:
          in: gen
        out:
          out: mod
    - role: processor
      image: processor:latest
      config:
        baseUrl: http://sut:8080
        mode: THREAD_COUNT
        threadCount: 1
        inputs:
          type: RABBITMQ
        outputs:
          type: RABBITMQ
      work:
        in:
          in: mod
        out:
          out: final
    - role: postprocessor
      image: postprocessor:latest
      config:
        forwardToOutput: false
        txOutcomeSinkMode: NONE
        dropTxOutcomeWithoutCallId: true
      work:
        in:
          in: final
