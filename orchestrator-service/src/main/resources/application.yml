spring:
  application:
    name: orchestrator-service
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  config: classpath:logback-spring.xml
  pattern:
    level: "%5p [%X{traceId}]"

pockethive:
  auth:
    service-url: ${POCKETHIVE_AUTH_SERVICE_URL:http://auth-service:8080}
    connect-timeout: ${POCKETHIVE_AUTH_CONNECT_TIMEOUT:PT2S}
    read-timeout: ${POCKETHIVE_AUTH_READ_TIMEOUT:PT5S}
    service-principal:
      name: ${POCKETHIVE_AUTH_SERVICE_PRINCIPAL_NAME:}
      secret: ${POCKETHIVE_AUTH_SERVICE_PRINCIPAL_SECRET:}
  journal:
    sink: ${POCKETHIVE_JOURNAL_SINK:postgres}
    postgres:
      retention-days: ${POCKETHIVE_JOURNAL_POSTGRES_RETENTION_DAYS:14}
      partition:
        create-days-back: ${POCKETHIVE_JOURNAL_POSTGRES_PARTITION_CREATE_DAYS_BACK:1}
        create-days-ahead: ${POCKETHIVE_JOURNAL_POSTGRES_PARTITION_CREATE_DAYS_AHEAD:2}
        default-move-batch-size: ${POCKETHIVE_JOURNAL_POSTGRES_PARTITION_DEFAULT_MOVE_BATCH_SIZE:5000}
        default-max-future-days: ${POCKETHIVE_JOURNAL_POSTGRES_PARTITION_DEFAULT_MAX_FUTURE_DAYS:14}
        reconcile:
          initial-delay-ms: ${POCKETHIVE_JOURNAL_POSTGRES_PARTITION_RECONCILE_INITIAL_DELAY_MS:2000}
          fixed-delay-ms: ${POCKETHIVE_JOURNAL_POSTGRES_PARTITION_RECONCILE_FIXED_DELAY_MS:60000}
  metrics:
    adapter: ${POCKETHIVE_METRICS_ADAPTER}
    publish-interval: ${POCKETHIVE_METRICS_PUBLISH_INTERVAL:10s}
    swarm-id: ${POCKETHIVE_METRICS_SWARM_ID:hive}
    run-id: ${POCKETHIVE_METRICS_RUN_ID:not-run-scoped}
    role: ${POCKETHIVE_METRICS_ROLE:orchestrator}
    instance: ${POCKETHIVE_METRICS_INSTANCE:orchestrator-local}
  control-plane:
    exchange: ${POCKETHIVE_CONTROL_PLANE_EXCHANGE:ph.control}
    control-queue-prefix: ${POCKETHIVE_CONTROL_PLANE_CONTROL_QUEUE_PREFIX:ph.control}
    swarm-id: ${POCKETHIVE_CONTROL_PLANE_SWARM_ID:hive}
    instance-id: ${POCKETHIVE_CONTROL_PLANE_INSTANCE_ID:orchestrator-local}
    manager:
      enabled: true
      role: ${POCKETHIVE_CONTROL_PLANE_MANAGER_ROLE:orchestrator}
    worker:
      enabled: ${POCKETHIVE_CONTROL_PLANE_WORKER_ENABLED:false}
    orchestrator:
      control-queue-prefix: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_CONTROL_QUEUE_PREFIX:ph.control.orchestrator}
      status-queue-prefix: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_STATUS_QUEUE_PREFIX:ph.control.orchestrator-status}
      metrics:
        adapter: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_ADAPTER}
        publish-interval: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_PUBLISH_INTERVAL:10s}
        clickhouse:
          endpoint: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_ENDPOINT:}
          table: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_TABLE:ph_metrics_samples}
          username: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_USERNAME:}
          password: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_PASSWORD:}
          connect-timeout-ms: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_CONNECT_TIMEOUT_MS:3000}
          read-timeout-ms: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_READ_TIMEOUT_MS:5000}
          batch-size: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_BATCH_SIZE:200}
          flush-interval-ms: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_FLUSH_INTERVAL_MS:200}
          max-buffered-samples: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_MAX_BUFFERED_SAMPLES:50000}
          max-label-count: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_MAX_LABEL_COUNT:20}
          max-label-key-length: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_MAX_LABEL_KEY_LENGTH:80}
          max-label-value-length: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_METRICS_CLICKHOUSE_MAX_LABEL_VALUE_LENGTH:256}
      docker:
        socket-path: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_DOCKER_SOCKET_PATH:/var/run/docker.sock}
      images:
        repository-prefix: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_IMAGE_REPOSITORY_PREFIX:}
      scenario-manager:
        url: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_SCENARIO_MANAGER_URL:http://scenario-manager:8080}
        http:
          connect-timeout: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_SCENARIO_MANAGER_HTTP_CONNECT_TIMEOUT:PT5S}
          read-timeout: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_SCENARIO_MANAGER_HTTP_READ_TIMEOUT:PT30S}
      network-proxy-manager:
        url: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_NETWORK_PROXY_MANAGER_URL:http://network-proxy-manager:8080}
        http:
          connect-timeout: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_NETWORK_PROXY_MANAGER_HTTP_CONNECT_TIMEOUT:PT5S}
          read-timeout: ${POCKETHIVE_CONTROL_PLANE_ORCHESTRATOR_NETWORK_PROXY_MANAGER_HTTP_READ_TIMEOUT:PT30S}
