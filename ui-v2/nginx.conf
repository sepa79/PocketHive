# /etc/nginx/conf.d/00-logging.conf  (http context)
log_format proxy '$remote_addr - $remote_user [$time_local] '
                '"$request" $status $body_bytes_sent '
                'host="$host" req="$request_uri" '
                'upstream="$upstream_addr" u_status="$upstream_status" '
                'u_time="$upstream_response_time" redir="$upstream_http_location"';

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
  listen 8088;
  server_name _;
  resolver 127.0.0.11 ipv6=off valid=30s;

  access_log /dev/stdout proxy;

  root /usr/share/nginx/html;
  index index.html;

  location = /rabbitmq { return 301 /rabbitmq/; }
  location = /grafana { return 301 /grafana/; }
  location = /redis { return 301 /redis/; }
  location = /docs { return 301 /docs/; }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location /ws {
    set $rmq_host rabbitmq;
    proxy_pass http://$rmq_host:15674/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 600s;
  }

  location /wiremock/ {
    set $wiremock_host wiremock;
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "*";
      add_header Access-Control-Allow-Headers "Authorization,Content-Type";
      add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
      return 204;
    }
    proxy_pass http://$wiremock_host:8080/;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
  }

  location /grafana {
    set $grafana_host grafana;
    proxy_pass http://$grafana_host:3000$request_uri;
    proxy_set_header Host $host;
  }

  location /grafana/api/live/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    set $grafana_host grafana;
    proxy_pass http://$grafana_host:3000$request_uri;
  }

  location ^~ /rabbitmq/ {
    set $rabbitmq_host rabbitmq;
    proxy_pass http://$rabbitmq_host:15672$request_uri;

    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /rabbitmq;

    proxy_redirect off;
    proxy_read_timeout 300;
    proxy_send_timeout 300;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
  }

  location ^~ /redis/ {
    set $redis_commander_host redis-commander;
    rewrite ^/redis/(.*)$ /$1 break;
    proxy_pass http://$redis_commander_host:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
  }

  location ^~ /docs/ {
    try_files $uri $uri/ /docs/index.html;
  }

  location /scenario-manager/ {
    set $scenario_manager scenario-manager;
    rewrite ^/scenario-manager/(.*)$ /$1 break;
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "*";
      add_header Access-Control-Allow-Headers "Authorization,Content-Type";
      add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
      return 204;
    }
    proxy_pass http://$scenario_manager:8080;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
  }

  location /orchestrator/actuator/ {
    set $orchestrator orchestrator;
    rewrite ^/orchestrator/(.*)$ /$1 break;
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "*";
      add_header Access-Control-Allow-Headers "Authorization,Content-Type";
      add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
      return 204;
    }
    proxy_pass http://$orchestrator:8080;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
  }

  location /scenario-manager/actuator/ {
    set $scenario_manager scenario-manager;
    rewrite ^/scenario-manager/(.*)$ /$1 break;
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "*";
      add_header Access-Control-Allow-Headers "Authorization,Content-Type";
      add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
      return 204;
    }
    proxy_pass http://$scenario_manager:8080;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
  }

  location /network-proxy-manager/ {
    set $network_proxy_manager network-proxy-manager;
    rewrite ^/network-proxy-manager/(.*)$ /$1 break;
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "*";
      add_header Access-Control-Allow-Headers "Authorization,Content-Type";
      add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
      return 204;
    }
    proxy_pass http://$network_proxy_manager:8080;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
  }

  location /auth-service/ {
    set $auth_service auth-service;
    rewrite ^/auth-service/(.*)$ /$1 break;
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "*";
      add_header Access-Control-Allow-Headers "Authorization,Content-Type";
      add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
      return 204;
    }
    proxy_pass http://$auth_service:8080;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
  }

  location /orchestrator/ {
    set $orchestrator orchestrator;
    rewrite ^/orchestrator/api/(.*)$ /api/$1 break;
    rewrite ^/orchestrator/(.*)$ /api/$1 break;
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin "*";
      add_header Access-Control-Allow-Headers "Authorization,Content-Type";
      add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
      return 204;
    }
    proxy_pass http://$orchestrator:8080;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
  }

  location = /v2 {
    return 302 /;
  }

  location ^~ /v2/ {
    add_header Cache-Control 'no-store';
    rewrite ^/v2/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ^~ /ui/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /index.html;
  }
}
