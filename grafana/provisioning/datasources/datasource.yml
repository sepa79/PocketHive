apiVersion: 1

deleteDatasources:
  - name: Loki
    orgId: 1
  - name: Prometheus
    orgId: 1

datasources:
  - name: PocketHive Journal (Postgres)
    type: postgres
    access: proxy
    url: postgres:5432
    user: pockethive
    database: pockethive
    jsonData:
      database: pockethive
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: pockethive
  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    jsonData:
      protocol: http
      host: clickhouse
      port: 8123
      username: pockethive
      defaultDatabase: default
      tlsSkipVerify: false
    secureJsonData:
      password: pockethive
