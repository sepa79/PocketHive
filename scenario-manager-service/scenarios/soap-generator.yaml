id: soap-generator
name: SOAP Generator Sample
description: Custom-role example that drives the PayloadGenerator worker with SOAP templates and feeds a processor.
template:
  image: swarm-controller:latest
  bees:
    - role: payload-generator
      image: payload-generator:latest
      config:
        pockethive:
          control-plane:
            worker:
              role: soap-generator
          worker:
            config:
              scheduler:
                rate-per-sec: 10
              template:
                path: /soap
                method: POST
                body: |
                  <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                                    xmlns:req="http://example.com/req/v1">
                    <soapenv:Header>
                      <req:ClientId>{{ seed.headers['instanceId'] }}</req:ClientId>
                    </soapenv:Header>
                    <soapenv:Body>
                      <req:PingRequest tick="{{ seed.headers['x-ph-scheduler-tick'] }}">
                        <req:payload>{{ seed.body | default(record.payload) }}</req:payload>
                      </req:PingRequest>
                    </soapenv:Body>
                  </soapenv:Envelope>
                headers:
                  content-type: text/xml
                  soapaction: Ping
      work:
        out: soap-generator-out
    - role: processor
      image: processor:latest
      config:
        pockethive:
          control-plane:
            worker:
              role: soap-processor
          worker:
            config:
              batchSize: 5
      work:
        in: soap-generator-out
        out: soap-processor-out
