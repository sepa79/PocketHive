schemaVersion: "1.0"
capabilitiesVersion: "1.2"
role: generator
image:
  name: generator
ui:
  label: "Generator"
  color: "#22d3ee"
  shape: "triangle"
  abbreviation: "GE"
  hideIo: true
config:
  - name: inputs.type
    type: string
    liveMutable: false
    required: true
    options:
      - "SCHEDULER"
      - "REDIS_DATASET"
      - "CSV_DATASET"
    ui:
      label: Input type
      group: IO
  - name: message.bodyType
    type: string
    liveMutable: true
    required: true
    options:
      - "HTTP"
      - "SIMPLE"
    ui:
      label: Body type
      group: Message
  - name: message.path
    type: string
    liveMutable: true
    required: true
    when:
      message.bodyType: "HTTP"
    ui:
      label: Path
      group: Message
  - name: message.method
    type: string
    liveMutable: true
    required: true
    options:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "PATCH"
      - "HEAD"
      - "OPTIONS"
    when:
      message.bodyType: "HTTP"
    ui:
      label: Method
      group: Message
  - name: message.body
    type: string
    liveMutable: true
    required: true
    multiline: true
    ui:
      label: Body
      group: Message
  - name: message.headers
    type: json
    liveMutable: true
    multiline: true
    ui:
      label: Headers
      group: Message
actions: []
panels: []
