schemaVersion: "1.0"
capabilitiesVersion: "1.0"
role: io-csv-dataset
image:
  name: io-csv-dataset
ui:
  label: "CSV dataset IO"
  ioType: "CSV_DATASET"
  ioScope: "INPUT"
config:
  - name: inputs.csv.filePath
    type: string
    liveMutable: false
    required: true
    ui:
      label: CSV file path
      group: CSV
  - name: inputs.csv.ratePerSec
    type: number
    liveMutable: true
    required: true
    min: 0
    ui:
      label: Rate
      group: CSV
      step: 1
      unit: msg/s
  - name: inputs.csv.rotate
    type: boolean
    liveMutable: false
    required: true
    ui:
      label: Rotate rows
      group: CSV
  - name: inputs.csv.skipHeader
    type: boolean
    liveMutable: false
    required: true
    ui:
      label: First row is header
      group: CSV
  - name: inputs.csv.delimiter
    type: string
    liveMutable: false
    required: true
    ui:
      label: Delimiter
      group: CSV
  - name: inputs.csv.charset
    type: string
    liveMutable: false
    required: true
    ui:
      label: Charset
      group: CSV
  - name: inputs.csv.startupDelaySeconds
    type: integer
    liveMutable: false
    required: true
    min: 0
    ui:
      label: Startup delay
      group: CSV
      unit: s
  - name: inputs.csv.tickIntervalMs
    type: integer
    liveMutable: false
    required: true
    min: 100
    ui:
      label: Tick interval
      group: CSV
      unit: ms
actions: []
panels: []
