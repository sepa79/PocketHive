schemaVersion: "1.0"
capabilitiesVersion: "1.0"
role: postprocessor
image:
  name: postprocessor
ui:
  label: "Postprocessor"
  color: "#facc15"
  shape: "hexagon"
  abbreviation: "PP"
config:
  - name: forwardToOutput
    type: boolean
    liveMutable: true
    required: true
    ui:
      label: Forward to output
      group: Output
  - name: txOutcomeSinkMode
    type: string
    liveMutable: true
    required: true
    options:
      - "NONE"
      - "CLICKHOUSE_V2"
    ui:
      label: Tx outcome sink
      group: Output
  - name: dropTxOutcomeWithoutCallId
    type: boolean
    liveMutable: true
    required: true
    ui:
      label: Drop tx outcomes without call id
      group: Output
actions: []
panels: []
