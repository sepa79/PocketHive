schemaVersion: "1.0"
capabilitiesVersion: "1.1"
role: io-scheduler
image:
  name: io-scheduler
ui:
  label: "Scheduler IO"
  ioType: "SCHEDULER"
  ioScope: "INPUT"
config:
  - name: inputs.scheduler.ratePerSec
    type: number
    required: true
    min: 0
    ui:
      step: 1
      unit: msg/s
  - name: inputs.scheduler.maxMessages
    type: integer
    required: true
    min: 0
    ui:
      step: 1
      unit: messages
  - name: inputs.scheduler.reset
    type: boolean
actions: []
panels: []
