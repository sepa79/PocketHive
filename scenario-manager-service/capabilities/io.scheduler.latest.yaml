schemaVersion: "1.0"
capabilitiesVersion: "1.2"
role: io-scheduler
image:
  name: io-scheduler
ui:
  label: "Scheduler IO"
  ioType: "SCHEDULER"
  ioScope: "INPUT"
config:
  - name: inputs.scheduler.ratePerSec
    type: number
    default: 0
    min: 0
    max: 1000
    ui:
      step: 1
      unit: msg/s
  - name: inputs.scheduler.maxMessages
    type: string
    default: "0"
    min: 0
    description: "Finite scheduler cap. Use a whole number or a numeric scenario-variable template such as {{ vars.userCount }}."
    ui:
      step: 1
      unit: messages
  - name: inputs.scheduler.reset
    type: boolean
    default: false
actions: []
panels: []
