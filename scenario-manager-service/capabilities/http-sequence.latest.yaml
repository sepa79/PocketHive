schemaVersion: "1.0"
capabilitiesVersion: "1.1"
role: http-sequence
image:
  name: http-sequence
ui:
  label: "HTTP Sequence"
  color: "#0ea5e9"
  shape: "square"
  abbreviation: "HS"
config:
  - name: baseUrl
    type: string
    liveMutable: true
    required: true
    ui:
      label: Base URL
      group: HTTP
  - name: templateRoot
    type: string
    liveMutable: true
    required: true
    ui:
      label: Template root
      group: Templates
  - name: serviceId
    type: string
    liveMutable: true
    required: true
    ui:
      label: Service ID
      group: Templates
  - name: threadCount
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Max in-flight journeys
      group: Runtime
  - name: steps
    type: json
    liveMutable: true
    required: true
    multiline: true
    ui:
      label: Steps
      group: Journey
  - name: debugCapture
    type: json
    liveMutable: true
    required: true
    multiline: true
    ui:
      label: Debug capture
      group: Debug
actions: []
panels: []
