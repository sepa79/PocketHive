schemaVersion: "1.0"
capabilitiesVersion: "1.0"
role: payload-generator
image:
  name: payload-generator
  tag: latest
ui:
  label: "Payload Generator"
  color: "#a855f7"
  shape: "hexagon"
  abbreviation: "PG"
config:
  - name: enabled
    type: boolean
    default: false
  - name: scheduler.ratePerSec
    type: number
    default: 1
    min: 0
    max: 100000
    ui:
      step: 0.5
      unit: msg/s
  - name: scheduler.singleRequest
    type: boolean
    default: false
  - name: template.body
    type: text
    default: "<payload>{{ seed.body | default('Hello from PayloadGenerator') }}</payload>"
    multiline: true
  - name: template.method
    type: string
    default: POST
  - name: template.url
    type: string
    default: ""
  - name: template.base-url
    type: string
    default: http://wiremock:8080
  - name: template.path
    type: string
    default: /soap
  - name: template.query
    type: json
    default: {}
    multiline: false
  - name: template.headers
    type: json
    default: {"content-type":"text/xml"}
    multiline: true
actions: []
panels: []
