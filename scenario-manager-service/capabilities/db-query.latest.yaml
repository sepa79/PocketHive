schemaVersion: "1.0"
capabilitiesVersion: "1.0"
role: db-query
image:
  name: db-query
ui:
  label: "DB Query"
  color: "#16a34a"
  shape: "square"
  abbreviation: "DB"
config:
  - name: adapter
    type: string
    liveMutable: true
    required: true
    options:
      - "POSTGRES"
      - "ORACLE"
    ui:
      label: Adapter
      group: Database
  - name: templateRoot
    type: string
    liveMutable: true
    required: true
    ui:
      label: Template root
      group: Templates
  - name: serviceId
    type: string
    liveMutable: true
    required: true
    ui:
      label: Service ID
      group: Templates
  - name: queryId
    type: string
    liveMutable: true
    required: true
    ui:
      label: Query ID
      group: Templates
  - name: threadCount
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Thread count
      group: Runtime
  - name: queryTimeoutMs
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Query timeout (ms)
      group: Runtime
  - name: connection.jdbcUrl
    type: string
    liveMutable: true
    required: true
    ui:
      label: JDBC URL
      group: Connection
  - name: connection.username
    type: string
    liveMutable: true
    required: true
    allowBlank: true
    ui:
      label: Username
      group: Connection
  - name: connection.password
    type: string
    liveMutable: true
    required: true
    allowBlank: true
    ui:
      label: Password
      group: Connection
  - name: pool.maxSize
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Pool max size
      group: Pool
  - name: pool.minIdle
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Pool min idle
      group: Pool
  - name: pool.connectionTimeoutMs
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Connection timeout (ms)
      group: Pool
  - name: pool.validationTimeoutMs
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Validation timeout (ms)
      group: Pool
  - name: pool.idleTimeoutMs
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Idle timeout (ms)
      group: Pool
  - name: pool.maxLifetimeMs
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Max lifetime (ms)
      group: Pool
  - name: retry.maxAttempts
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Retry attempts
      group: Retry
  - name: retry.initialBackoffMs
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Initial backoff (ms)
      group: Retry
  - name: retry.backoffMultiplier
    type: number
    liveMutable: true
    required: true
    ui:
      label: Backoff multiplier
      group: Retry
  - name: retry.maxBackoffMs
    type: integer
    liveMutable: true
    required: true
    ui:
      label: Max backoff (ms)
      group: Retry
  - name: retry.on
    type: json
    liveMutable: true
    required: true
    multiline: true
    ui:
      label: Retry tokens
      group: Retry
actions: []
panels: []
